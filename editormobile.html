<script>
/* =========================
   ID SEMPRE VÁLIDO
========================= */
const params = new URLSearchParams(window.location.search);
let idAtual = params.get("id");

if (!idAtual) {
    idAtual = crypto.randomUUID();
    window.history.replaceState({}, "", "?id=" + idAtual);
}

/* =========================
   ESTADO
========================= */
let carregando = true;
let timeout = null;

/* =========================
   SALVAR
========================= */
function salvar() {
    if (!idAtual || carregando) return;

    console.log("SALVANDO:", idAtual);

    set(ref(db, "personagens/" + idAtual), {
        nome: document.getElementById("nome").value || "",
        evento: document.getElementById("evento").value || "",
        social: document.getElementById("social").value || "",

        saude: {
            hp_atual: Number(document.getElementById("hp_atual").value) || 0,
            hp_max: Number(document.getElementById("hp_max").value) || 0
        },

        instintos: {
            reacao: Number(document.getElementById("reacao").value) || 0,
            percepcao: Number(document.getElementById("percepcao").value) || 0,
            sagacidade: Number(document.getElementById("sagacidade").value) || 0,
            potencia: Number(document.getElementById("potencia").value) || 0,
            influencia: Number(document.getElementById("influencia").value) || 0,
            resolucao: Number(document.getElementById("resolucao").value) || 0
        },

        conhecimentos: {
            agrario: Number(document.getElementById("agrario").value) || 0,
            biologico: Number(document.getElementById("biologico").value) || 0,
            exato: Number(document.getElementById("exato").value) || 0,
            medicina: Number(document.getElementById("medicina").value) || 0,
            social: Number(document.getElementById("social2").value) || 0,
            artistico: Number(document.getElementById("artistico").value) || 0
        },

        praticas: {
            esportivas: Number(document.getElementById("esportivas").value) || 0,
            ferramentas: Number(document.getElementById("ferramentas").value) || 0,
            oficios: Number(document.getElementById("oficios").value) || 0,
            armas: Number(document.getElementById("armas").value) || 0,
            veiculos: Number(document.getElementById("veiculos").value) || 0,
            infiltracao: Number(document.getElementById("infiltracao").value) || 0
        },

        caracteristicas: document.getElementById("caracteristicas").value || "",
        equipamentos: document.getElementById("equipamentos").value || ""
    });
}

/* =========================
   CARREGAR
========================= */
function carregar() {
    console.log("CARREGANDO:", idAtual);

    get(child(ref(db), "personagens/" + idAtual)).then(snapshot => {
        if (!snapshot.exists()) {
            carregando = false;
            return;
        }

        const p = snapshot.val();

        document.getElementById("nome").value = p.nome || "";
        document.getElementById("evento").value = p.evento || "";
        document.getElementById("social").value = p.social || "";

        document.getElementById("hp_atual").value = p.saude?.hp_atual || "";
        document.getElementById("hp_max").value = p.saude?.hp_max || "";

        document.getElementById("reacao").value = p.instintos?.reacao || "";
        document.getElementById("percepcao").value = p.instintos?.percepcao || "";
        document.getElementById("sagacidade").value = p.instintos?.sagacidade || "";
        document.getElementById("potencia").value = p.instintos?.potencia || "";
        document.getElementById("influencia").value = p.instintos?.influencia || "";
        document.getElementById("resolucao").value = p.instintos?.resolucao || "";

        document.getElementById("agrario").value = p.conhecimentos?.agrario || "";
        document.getElementById("biologico").value = p.conhecimentos?.biologico || "";
        document.getElementById("exato").value = p.conhecimentos?.exato || "";
        document.getElementById("medicina").value = p.conhecimentos?.medicina || "";
        document.getElementById("social2").value = p.conhecimentos?.social || "";
        document.getElementById("artistico").value = p.conhecimentos?.artistico || "";

        document.getElementById("esportivas").value = p.praticas?.esportivas || "";
        document.getElementById("ferramentas").value = p.praticas?.ferramentas || "";
        document.getElementById("oficios").value = p.praticas?.oficios || "";
        document.getElementById("armas").value = p.praticas?.armas || "";
        document.getElementById("veiculos").value = p.praticas?.veiculos || "";
        document.getElementById("infiltracao").value = p.praticas?.infiltracao || "";

        document.getElementById("caracteristicas").value = p.caracteristicas || "";
        document.getElementById("equipamentos").value = p.equipamentos || "";

        carregando = false;
    });
}

/* =========================
   AUTOSAVE
========================= */
document.querySelectorAll("input, textarea").forEach(el => {
    el.addEventListener("input", () => {
        if (carregando) return;

        clearTimeout(timeout);
        timeout = setTimeout(() => {
            salvar();
        }, 500);
    });
});

/* =========================
   START
========================= */
window.onload = carregar;
</script>
