<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ficha</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
}

h2 {
    text-align: center;
    margin: 10px 0;
}

.tabs {
    display: flex;
    background: #222;
}

.tabs button {
    flex: 1;
    padding: 14px;
    border: none;
    background: #222;
    color: white;
}

.tab {
    display: none;
    padding: 12px;
}

input, textarea {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border-radius: 6px;
    border: none;
    margin-bottom: 12px;
    box-sizing: border-box;
    text-align: center;
}

textarea {
    height: 80px;
    text-align: left;
}

.grid2x3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 15px;
}

.cell {
    text-align: center;
}

.cell input {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border-radius: 6px;
    border: none;
    text-align: center;
}

.label {
    font-size: 12px;
    margin-top: 4px;
    opacity: 0.7;
}

h3 {
    margin: 10px 0;
    font-size: 16px;
}
</style>
</head>

<body>

<h2>Ficha Assimilação RPG</h2>

<div class="tabs">
    <button onclick="showTab('basico')">Básico</button>
    <button onclick="showTab('combate')">Combate</button>
    <button onclick="showTab('extras')">Extras</button>
</div>

<!-- BÁSICO -->
<div id="basico" class="tab">
    <input id="nome" placeholder="Nome">
    <textarea id="evento" placeholder="Evento Marcante"></textarea>
    <input id="social" placeholder="Posição Social">
</div>

<!-- COMBATE -->
<div id="combate" class="tab">

<h3>Combate</h3>

<div class="grid2x3">
    <div class="cell">
        <input id="hp_atual" type="number">
        <div class="label">HP Atual</div>
    </div>

    <div class="cell">
        <input id="hp_max" type="number">
        <div class="label">HP Máximo</div>
    </div>
</div>

<h3>Instintos</h3>

<div class="grid2x3">
    <div class="cell"><input id="reacao" type="number"><div class="label">Reação</div></div>
    <div class="cell"><input id="percepcao" type="number"><div class="label">Percepção</div></div>
    <div class="cell"><input id="sagacidade" type="number"><div class="label">Sagacidade</div></div>
</div>

<div class="grid2x3">
    <div class="cell"><input id="potencia" type="number"><div class="label">Potência</div></div>
    <div class="cell"><input id="influencia" type="number"><div class="label">Influência</div></div>
    <div class="cell"><input id="resolucao" type="number"><div class="label">Resolução</div></div>
</div>

</div>

<!-- EXTRAS -->
<div id="extras" class="tab">
    <textarea id="caracteristicas" placeholder="Características"></textarea>
    <textarea id="equipamentos" placeholder="Equipamentos"></textarea>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBp6FWCK0IYmeAbCMjdyStz5z1xeUvieV4",
  authDomain: "fichasrpg-45934.firebaseapp.com",
  databaseURL: "https://fichasrpg-45934-default-rtdb.firebaseio.com",
  projectId: "fichasrpg-45934",
  storageBucket: "fichasrpg-45934.firebasestorage.app",
  messagingSenderId: "523682127281",
  measurementId: "G-L22V165GJX"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.db = db;
window.ref = ref;
window.set = set;
window.get = get;
window.child = child;
</script>

<script>
const params = new URLSearchParams(window.location.search);
let idAtual = params.get("id") || crypto.randomUUID();
window.history.replaceState({}, "", "?id=" + idAtual);

let carregando = true;
let salvando = false;
let timeout = null;

/* ---------------- SAVE ---------------- */
async function salvar() {
    if (!idAtual || carregando || salvando) return;

    salvando = true;

    try {
        await set(ref(db, "personagens/" + idAtual), {
            nome: document.getElementById("nome").value || "",
            evento: document.getElementById("evento").value || "",
            social: document.getElementById("social").value || "",

            saude: {
                hp_atual: Number(document.getElementById("hp_atual").value) || 0,
                hp_max: Number(document.getElementById("hp_max").value) || 0
            },

            instintos: {
                reacao: Number(document.getElementById("reacao").value) || 0,
                percepcao: Number(document.getElementById("percepcao").value) || 0,
                sagacidade: Number(document.getElementById("sagacidade").value) || 0,
                potencia: Number(document.getElementById("potencia").value) || 0,
                influencia: Number(document.getElementById("influencia").value) || 0,
                resolucao: Number(document.getElementById("resolucao").value) || 0
            },

            caracteristicas: document.getElementById("caracteristicas").value || "",
            equipamentos: document.getElementById("equipamentos").value || ""
        });

        console.log("Salvo com sucesso:", idAtual);

    } catch (err) {
        console.error("Erro ao salvar:", err);
    }

    salvando = false;
}

/* ---------------- LOAD ---------------- */
async function carregar() {
    try {
        const snap = await get(child(ref(db), "personagens/" + idAtual));

        if (!snap.exists()) {
            carregando = false;
            return;
        }

        const p = snap.val();

        document.getElementById("nome").value = p.nome || "";
        document.getElementById("evento").value = p.evento || "";
        document.getElementById("social").value = p.social || "";

        document.getElementById("hp_atual").value = p.saude?.hp_atual || "";
        document.getElementById("hp_max").value = p.saude?.hp_max || "";

        document.getElementById("reacao").value = p.instintos?.reacao || "";
        document.getElementById("percepcao").value = p.instintos?.percepcao || "";
        document.getElementById("sagacidade").value = p.instintos?.sagacidade || "";
        document.getElementById("potencia").value = p.instintos?.potencia || "";
        document.getElementById("influencia").value = p.instintos?.influencia || "";
        document.getElementById("resolucao").value = p.instintos?.resolucao || "";

        document.getElementById("caracteristicas").value = p.caracteristicas || "";
        document.getElementById("equipamentos").value = p.equipamentos || "";

        carregando = false;

    } catch (err) {
        console.error("Erro ao carregar:", err);
    }
}

/* ---------------- AUTOSAVE ---------------- */
document.querySelectorAll("input, textarea").forEach(el => {
    el.addEventListener("input", () => {
        if (carregando || salvando) return;

        clearTimeout(timeout);
        timeout = setTimeout(salvar, 800);
    });
});

/* ---------------- UI ---------------- */
function showTab(id) {
    document.querySelectorAll(".tab").forEach(t => t.style.display = "none");
    document.getElementById(id).style.display = "block";
}

window.onload = async () => {
    showTab("basico");
    await carregar();
};
</script>

</body>
</html>
