<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Editor RPG Mobile</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
}

h2 {
    text-align: center;
    margin: 10px 0;
}

.tabs {
    display: flex;
    background: #222;
}

.tabs button {
    flex: 1;
    padding: 14px;
    border: none;
    background: #222;
    color: white;
}

.tab {
    display: none;
    padding: 12px;
}

input, textarea {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    font-size: 16px;
    border-radius: 5px;
    border: none;
    box-sizing: border-box;
}

textarea {
    height: 80px;
}

.save-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #00c853;
    color: white;
    border: none;
    padding: 15px 20px;
    border-radius: 50px;
}
</style>
</head>

<body>

<h2>Editor de Ficha</h2>

<div class="tabs">
    <button onclick="showTab('basico')">Básico</button>
    <button onclick="showTab('combate')">Combate</button>
    <button onclick="showTab('atributos')">Atributos</button>
    <button onclick="showTab('extras')">Extras</button>
</div>

<!-- BÁSICO -->
<div id="basico" class="tab">
    <input id="nome" placeholder="Nome">
    <textarea id="evento" placeholder="Evento Marcante"></textarea>
    <input id="social" placeholder="Posição Social">
</div>

<!-- COMBATE -->
<div id="combate" class="tab">
    <input id="hp_atual" type="number" placeholder="HP Atual">
    <input id="hp_max" type="number" placeholder="HP Máximo">
</div>

<!-- ATRIBUTOS (REALMENTE UNIFICADO) -->
<div id="atributos" class="tab">

<input id="reacao" type="number" placeholder="Reação">
<input id="percepcao" type="number" placeholder="Percepção">
<input id="sagacidade" type="number" placeholder="Sagacidade">
<input id="potencia" type="number" placeholder="Potência">
<input id="influencia" type="number" placeholder="Influência">
<input id="resolucao" type="number" placeholder="Resolução">

<hr style="opacity:0.2">

<input id="agrario" type="number" placeholder="Agrário">
<input id="biologico" type="number" placeholder="Biológico">
<input id="exato" type="number" placeholder="Exato">
<input id="medicina" type="number" placeholder="Medicina">
<input id="social2" type="number" placeholder="Social">
<input id="artistico" type="number" placeholder="Artístico">

<hr style="opacity:0.2">

<input id="esportivas" type="number" placeholder="Esportivas">
<input id="ferramentas" type="number" placeholder="Ferramentas">
<input id="oficios" type="number" placeholder="Ofícios">
<input id="armas" type="number" placeholder="Armas">
<input id="veiculos" type="number" placeholder="Veículos">
<input id="infiltracao" type="number" placeholder="Infiltração">

</div>
</div>

<!-- EXTRAS -->
<div id="extras" class="tab">
    <textarea id="caracteristicas" placeholder="Características"></textarea>
    <textarea id="equipamentos" placeholder="Equipamentos"></textarea>
</div>

<button class="save-btn" onclick="salvar()">💾</button>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBp6FWCK0IYmeAbCMjdyStz5z1xeUvieV4",
  authDomain: "fichasrpg-45934.firebaseapp.com",
  databaseURL: "https://fichasrpg-45934-default-rtdb.firebaseio.com",
  projectId: "fichasrpg-45934",
  storageBucket: "fichasrpg-45934.firebasestorage.app",
  messagingSenderId: "523682127281",
  measurementId: "G-L22V165GJX"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.db = db;
window.ref = ref;
window.set = set;
window.get = get;
window.child = child;
</script>

<script>
let idAtual = new URLSearchParams(window.location.search).get("id");

let carregando = true;
let timeout = null;

// 💾 SALVAR
function salvar() {
    if (!idAtual || carregando) return;

    set(ref(db, "personagens/" + idAtual), {
        id: idAtual,

        nome: document.getElementById("nome").value || "",
        evento: document.getElementById("evento").value || "",
        social: document.getElementById("social").value || "",

        saude: {
            hp_atual: Number(document.getElementById("hp_atual").value) || 0,
            hp_max: Number(document.getElementById("hp_max").value) || 0
        },

        instintos: {
            reacao: Number(document.getElementById("reacao").value) || 0,
            percepcao: Number(document.getElementById("percepcao").value) || 0,
            sagacidade: Number(document.getElementById("sagacidade").value) || 0,
            potencia: Number(document.getElementById("potencia").value) || 0,
            influencia: Number(document.getElementById("influencia").value) || 0,
            resolucao: Number(document.getElementById("resolucao").value) || 0
        },

        conhecimentos: {
            agrario: Number(document.getElementById("agrario").value) || 0,
            biologico: Number(document.getElementById("biologico").value) || 0,
            exato: Number(document.getElementById("exato").value) || 0,
            medicina: Number(document.getElementById("medicina").value) || 0,
            social: Number(document.getElementById("social2").value) || 0,
            artistico: Number(document.getElementById("artistico").value) || 0
        },

        praticas: {
            esportivas: Number(document.getElementById("esportivas").value) || 0,
            ferramentas: Number(document.getElementById("ferramentas").value) || 0,
            oficios: Number(document.getElementById("oficios").value) || 0,
            armas: Number(document.getElementById("armas").value) || 0,
            veiculos: Number(document.getElementById("veiculos").value) || 0,
            infiltracao: Number(document.getElementById("infiltracao").value) || 0
        },

        caracteristicas: document.getElementById("caracteristicas").value || "",
        equipamentos: document.getElementById("equipamentos").value || ""
    });
}

// 🔁 AUTOSAVE
function ativarAutosave() {
    document.querySelectorAll("input, textarea").forEach(el => {
        el.addEventListener("input", () => {
            if (carregando) return;

            clearTimeout(timeout);
            timeout = setTimeout(salvar, 700);
        });
    });
}

// 📥 CARREGAR
function carregar() {
    if (!idAtual) return;

    get(child(ref(db), "personagens/" + idAtual)).then(snapshot => {
        if (!snapshot.exists()) {
            carregando = false;
            ativarAutosave();
            return;
        }

        const p = snapshot.val();

        document.getElementById("nome").value = p.nome || "";
        document.getElementById("evento").value = p.evento || "";
        document.getElementById("social").value = p.social || "";

        document.getElementById("hp_atual").value = p.saude?.hp_atual || "";
        document.getElementById("hp_max").value = p.saude?.hp_max || "";

        // instintos
        document.getElementById("reacao").value = p.instintos?.reacao || "";
        document.getElementById("percepcao").value = p.instintos?.percepcao || "";
        document.getElementById("sagacidade").value = p.instintos?.sagacidade || "";
        document.getElementById("potencia").value = p.instintos?.potencia || "";
        document.getElementById("influencia").value = p.instintos?.influencia || "";
        document.getElementById("resolucao").value = p.instintos?.resolucao || "";

        // conhecimentos
        document.getElementById("agrario").value = p.conhecimentos?.agrario || "";
        document.getElementById("biologico").value = p.conhecimentos?.biologico || "";
        document.getElementById("exato").value = p.conhecimentos?.exato || "";
        document.getElementById("medicina").value = p.conhecimentos?.medicina || "";
        document.getElementById("social2").value = p.conhecimentos?.social || "";
        document.getElementById("artistico").value = p.conhecimentos?.artistico || "";

        // práticas
        document.getElementById("esportivas").value = p.praticas?.esportivas || "";
        document.getElementById("ferramentas").value = p.praticas?.ferramentas || "";
        document.getElementById("oficios").value = p.praticas?.oficios || "";
        document.getElementById("armas").value = p.praticas?.armas || "";
        document.getElementById("veiculos").value = p.praticas?.veiculos || "";
        document.getElementById("infiltracao").value = p.praticas?.infiltracao || "";

        document.getElementById("caracteristicas").value = p.caracteristicas || "";
        document.getElementById("equipamentos").value = p.equipamentos || "";

        carregando = false;
        ativarAutosave();
    });
}

// UI
function showTab(id) {
    document.querySelectorAll(".tab").forEach(t => t.style.display = "none");
    document.getElementById(id).style.display = "block";
}

window.onload = () => {
    showTab("basico");
    carregar();
};
</script>

</body>
</html>
