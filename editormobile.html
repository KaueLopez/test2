<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ficha</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
}

h2 {
    text-align: center;
    margin: 10px 0;
}

.tabs {
    display: flex;
    background: #222;
}

.tabs button {
    flex: 1;
    padding: 14px;
    border: none;
    background: #222;
    color: white;
}

.tab {
    display: none;
    padding: 12px;
}

input, textarea {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border-radius: 6px;
    border: none;
    margin-bottom: 12px;
    box-sizing: border-box;
    text-align: center;
}

textarea {
    height: 80px;
    text-align: left;
}

.grid2x3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 15px;
}

.cell {
    text-align: center;
}

.cell input {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border-radius: 6px;
    border: none;
    text-align: center;
}

.label {
    font-size: 12px;
    margin-top: 4px;
    opacity: 0.7;
}

h3 {
    margin: 10px 0;
    font-size: 16px;
}
</style>
</head>

<body>

<h2>Ficha RPG</h2>

<div class="tabs">
    <button onclick="showTab('basico')">Básico</button>
    <button onclick="showTab('combate')">Combate</button>
    <button onclick="showTab('extras')">Extras</button>
</div>

<!-- BÁSICO -->
<div id="basico" class="tab">
    <input id="nome" placeholder="Nome">
    <textarea id="evento" placeholder="Evento Marcante"></textarea>
    <input id="social" placeholder="Posição Social">
</div>

<!-- COMBATE + SISTEMA COMPLETO -->
<div id="combate" class="tab">

<h3>Combate</h3>

<div class="grid2x3">
    <div class="cell">
        <input id="hp_atual" type="number">
        <div class="label">HP Atual</div>
    </div>

    <div class="cell">
        <input id="hp_max" type="number">
        <div class="label">HP Máximo</div>
    </div>
</div>

<h3>Instintos</h3>
<div class="grid2x3">
    <div class="cell"><input id="reacao" type="number"><div class="label">Reação</div></div>
    <div class="cell"><input id="percepcao" type="number"><div class="label">Percepção</div></div>
    <div class="cell"><input id="sagacidade" type="number"><div class="label">Sagacidade</div></div>
</div>

<div class="grid2x3">
    <div class="cell"><input id="potencia" type="number"><div class="label">Potência</div></div>
    <div class="cell"><input id="influencia" type="number"><div class="label">Influência</div></div>
    <div class="cell"><input id="resolucao" type="number"><div class="label">Resolução</div></div>
</div>

<h3>Conhecimentos</h3>
<div class="grid2x3">
    <div class="cell"><input id="agrario" type="number"><div class="label">Agrário</div></div>
    <div class="cell"><input id="biologico" type="number"><div class="label">Biológico</div></div>
    <div class="cell"><input id="exato" type="number"><div class="label">Exato</div></div>
</div>

<div class="grid2x3">
    <div class="cell"><input id="medicina" type="number"><div class="label">Medicina</div></div>
    <div class="cell"><input id="social2" type="number"><div class="label">Social</div></div>
    <div class="cell"><input id="artistico" type="number"><div class="label">Artístico</div></div>
</div>

<h3>Práticas</h3>
<div class="grid2x3">
    <div class="cell"><input id="esportivas" type="number"><div class="label">Esportivas</div></div>
    <div class="cell"><input id="ferramentas" type="number"><div class="label">Ferramentas</div></div>
    <div class="cell"><input id="oficios" type="number"><div class="label">Ofícios</div></div>
</div>

<div class="grid2x3">
    <div class="cell"><input id="armas" type="number"><div class="label">Armas</div></div>
    <div class="cell"><input id="veiculos" type="number"><div class="label">Veículos</div></div>
    <div class="cell"><input id="infiltracao" type="number"><div class="label">Infiltração</div></div>
</div>

</div>

<!-- EXTRAS -->
<div id="extras" class="tab">
    <textarea id="caracteristicas" placeholder="Características"></textarea>
    <textarea id="equipamentos" placeholder="Equipamentos"></textarea>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBp6FWCK0IYmeAbCMjdyStz5z1xeUvieV4",
  authDomain: "fichasrpg-45934.firebaseapp.com",
  databaseURL: "https://fichasrpg-45934-default-rtdb.firebaseio.com",
  projectId: "fichasrpg-45934",
  storageBucket: "fichasrpg-45934.firebasestorage.app",
  messagingSenderId: "523682127281",
  measurementId: "G-L22V165GJX"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.db = db;
window.ref = ref;
window.set = set;
window.get = get;
window.child = child;
</script>

<script>
const params = new URLSearchParams(window.location.search);
let idAtual = params.get("id") || crypto.randomUUID();
window.history.replaceState({}, "", "?id=" + idAtual);

let carregando = true;
let timeout = null;
let salvando = false;

/* SAVE */
async function salvar() {
    if (!idAtual || carregando || salvando) return;

    salvando = true;

    await set(ref(db, "personagens/" + idAtual), {
        nome: nome.value || "",
        evento: evento.value || "",
        social: social.value || "",

        saude: {
            hp_atual: Number(hp_atual.value) || 0,
            hp_max: Number(hp_max.value) || 0
        },

        instintos: {
            reacao: Number(reacao.value) || 0,
            percepcao: Number(percepcao.value) || 0,
            sagacidade: Number(sagacidade.value) || 0,
            potencia: Number(potencia.value) || 0,
            influencia: Number(influencia.value) || 0,
            resolucao: Number(resolucao.value) || 0
        },

        conhecimentos: {
            agrario: Number(agrario.value) || 0,
            biologico: Number(biologico.value) || 0,
            exato: Number(exato.value) || 0,
            medicina: Number(medicina.value) || 0,
            social: Number(social2.value) || 0,
            artistico: Number(artistico.value) || 0
        },

        praticas: {
            esportivas: Number(esportivas.value) || 0,
            ferramentas: Number(ferramentas.value) || 0,
            oficios: Number(oficios.value) || 0,
            armas: Number(armas.value) || 0,
            veiculos: Number(veiculos.value) || 0,
            infiltracao: Number(infiltracao.value) || 0
        },

        caracteristicas: caracteristicas.value || "",
        equipamentos: equipamentos.value || ""
    });

    salvando = false;
}

/* LOAD */
async function carregar() {
    const snap = await get(child(ref(db), "personagens/" + idAtual));

    if (snap.exists()) {
        const p = snap.val();

        nome.value = p.nome || "";
        evento.value = p.evento || "";
        social.value = p.social || "";

        hp_atual.value = p.saude?.hp_atual || "";
        hp_max.value = p.saude?.hp_max || "";

        reacao.value = p.instintos?.reacao || "";
        percepcao.value = p.instintos?.percepcao || "";
        sagacidade.value = p.instintos?.sagacidade || "";
        potencia.value = p.instintos?.potencia || "";
        influencia.value = p.instintos?.influencia || "";
        resolucao.value = p.instintos?.resolucao || "";

        agrario.value = p.conhecimentos?.agrario || "";
        biologico.value = p.conhecimentos?.biologico || "";
        exato.value = p.conhecimentos?.exato || "";
        medicina.value = p.conhecimentos?.medicina || "";
        social2.value = p.conhecimentos?.social || "";
        artistico.value = p.conhecimentos?.artistico || "";

        esportivas.value = p.praticas?.esportivas || "";
        ferramentas.value = p.praticas?.ferramentas || "";
        oficios.value = p.praticas?.oficios || "";
        armas.value = p.praticas?.armas || "";
        veiculos.value = p.praticas?.veiculos || "";
        infiltracao.value = p.praticas?.infiltracao || "";

        caracteristicas.value = p.caracteristicas || "";
        equipamentos.value = p.equipamentos || "";
    }

    carregando = false;
}

/* AUTOSAVE */
document.querySelectorAll("input, textarea").forEach(el => {
    el.addEventListener("input", () => {
        if (carregando) return;

        clearTimeout(timeout);
        timeout = setTimeout(salvar, 600);
    });
});

/* TABS */
function showTab(id) {
    document.querySelectorAll(".tab").forEach(t => t.style.display = "none");
    document.getElementById(id).style.display = "block";
}

window.onload = () => {
    showTab("basico");
    carregar();
};
</script>

</body>
</html>
