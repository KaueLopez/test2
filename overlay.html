<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
    margin: 0;
    background: transparent;
    font-family: Arial;
}

.overlay {
    position: absolute;
    bottom: 30px;
    left: 30px;
    color: white;
    text-shadow: 1px 1px 3px black;
}

/* NOME */
.nome {
    font-size: 28px;
    font-weight: bold;
    display: inline-block;
}

/* HP */
.hp {
    font-size: 18px;
    margin-top: 5px;
    transition: opacity 0.2s ease, transform 0.2s ease;
}

/* ANIMAÇÃO FORÇADA */
@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

.pulse {
    animation: pulse 0.35s ease;
}
</style>
</head>

<body>

<div class="overlay">
    <div class="nome" id="nome">Nome</div>
    <div class="hp" id="hp">HP: 0 / 0</div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBp6FWCK0IYmeAbCMjdyStz5z1xeUvieV4",
  authDomain: "fichasrpg-45934.firebaseapp.com",
  databaseURL: "https://fichasrpg-45934-default-rtdb.firebaseio.com",
  projectId: "fichasrpg-45934",
  storageBucket: "fichasrpg-45934.firebasestorage.app",
  messagingSenderId: "523682127281",
  measurementId: "G-L22V165GJX"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🔥 ID do personagem
const id = new URLSearchParams(window.location.search).get("id");

if (!id) {
    console.error("ID não encontrado na URL");
}

// 🔁 listener em tempo real
function animar(el) {
    el.classList.remove("pulse");
    void el.offsetWidth; // força reinício da animação
    el.classList.add("pulse");
}

onValue(ref(db, "personagens/" + id), (snapshot) => {
    const p = snapshot.val();
    if (!p) return;

    const nomeEl = document.getElementById("nome");
    const hpEl = document.getElementById("hp");

    const novoNome = p.nome || "Sem nome";
    const hpAtual = Number(p.saude?.hp_atual || 0);
    const hpMax = Number(p.saude?.hp_max || 0);

    // NOME
    if (nomeEl.textContent !== novoNome) {
        nomeEl.textContent = novoNome;
        animar(nomeEl);
    }

    // HP (sem fade bugado, só update limpo)
    const novoHP = `HP: ${hpAtual} / ${hpMax}`;

    if (hpEl.textContent !== novoHP) {
        hpEl.textContent = novoHP;
        animar(hpEl);
    }
});

</script>

</body>
</html>
