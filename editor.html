<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Editor de Personagem</title>

<style>
body { font-family: Arial; margin: 20px; }

input, textarea {
    width: 100%;
    margin-bottom: 10px;
    padding: 5px;
}

.box {
    border: 1px solid #ccc;
    padding: 10px;
}

button {
    padding: 10px;
    margin-top: 10px;
}
    .grid2x3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 10px;
}

.grid2x3 input {
    width: 100%;
    text-align: center;
}

.grid2x3 div {
    text-align: center;
    font-size: 12px;
    margin-top: -5px;
}
</style>
</head>

<body>

<h2>Editor de Ficha</h2>

<div class="box" id="ficha">

<input id="nome" placeholder="Nome">
<textarea id="evento" placeholder="Evento Marcante"></textarea>
<input id="social" placeholder="Posição Social">

<h3>Saúde (HP)</h3>

<div class="grid2x3">
    <input id="hp_atual" type="number">
    <input id="hp_max" type="number">

    <div>HP Atual</div>
    <div>HP Máximo</div>
</div>
    
<h3>Instintos</h3>

<div class="grid2x3">
    <input id="reacao" type="number">
    <input id="percepcao" type="number">
    <input id="sagacidade" type="number">

    <div>Reação</div>
    <div>Percepção</div>
    <div>Sagacidade</div>
</div>

<div class="grid2x3">
    <input id="potencia" type="number">
    <input id="influencia" type="number">
    <input id="resolucao" type="number">

    <div>Potência</div>
    <div>Influência</div>
    <div>Resolução</div>
</div>
    
<h3>Conhecimentos</h3>

<div class="grid2x3">
    <input id="agrario" type="number">
    <input id="biologico" type="number">
    <input id="exato" type="number">

    <div>Agrário</div>
    <div>Biológico</div>
    <div>Exato</div>
</div>

<div class="grid2x3">
    <input id="medicina" type="number">
    <input id="social" type="number">
    <input id="artistico" type="number">

    <div>Medicina</div>
    <div>Social</div>
    <div>Artístico</div>
</div>
    
<h3>Práticas</h3>

<div class="grid2x3">
    <input id="esportivas" type="number">
    <input id="ferramentas" type="number">
    <input id="oficios" type="number">

    <div>Esportivas</div>
    <div>Ferramentas</div>
    <div>Ofícios</div>
</div>

<div class="grid2x3">
    <input id="armas" type="number">
    <input id="veiculos" type="number">
    <input id="infiltracao" type="number">

    <div>Armas</div>
    <div>Veículos</div>
    <div>Infiltração</div>
</div>
    
<h3>Características</h3>
<textarea id="caracteristicas"></textarea>

<h3>Equipamentos</h3>
<textarea id="equipamentos"></textarea>

</div>

<button onclick="exportar()">🖼 Exportar PNG</button>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBp6FWCK0IYmeAbCMjdyStz5z1xeUvieV4",
  authDomain: "fichasrpg-45934.firebaseapp.com",
  databaseURL: "https://fichasrpg-45934-default-rtdb.firebaseio.com",
  projectId: "fichasrpg-45934",
  storageBucket: "fichasrpg-45934.firebasestorage.app",
  messagingSenderId: "523682127281",
  measurementId: "G-L22V165GJX"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.db = db;
window.ref = ref;
window.set = set;
window.get = get;
window.child = child;
</script>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>

let idAtual = new URLSearchParams(window.location.search).get("id");

// 📥 CARREGAR PERSONAGEM
function carregar() {
    get(child(ref(db), "personagens/" + idAtual)).then(snap => {
        const p = snap.val();

        document.getElementById("nome").value = p.nome || "";
        document.getElementById("evento").value = p.evento || "";
        document.getElementById("social").value = p.social || "";
        document.getElementById("caracteristicas").value = p.caracteristicas || "";
        document.getElementById("equipamentos").value = p.equipamentos || "";
        document.getElementById("hp_atual").value = p.saude?.hp_atual || "";
        document.getElementById("hp_max").value = p.saude?.hp_max || "";
    });
}

// 💾 AUTOSAVE
function salvar() {
    set(ref(db, "personagens/" + idAtual), {
        id: idAtual,
        nome: document.getElementById("nome").value,
        evento: document.getElementById("evento").value,
        social: document.getElementById("social").value,
        caracteristicas: document.getElementById("caracteristicas").value,
        equipamentos: document.getElementById("equipamentos").value
       
    saude: {
    hp_atual: document.getElementById("hp_atual").value,
    hp_max: document.getElementById("hp_max").value
},
    });
}

// 🔁 AUTOSAVE AUTOMÁTICO
document.querySelectorAll("input, textarea").forEach(el => {
    el.addEventListener("input", () => {
        clearTimeout(window.t);
        window.t = setTimeout(salvar, 500);
    });
});

// 🖼 EXPORTAR IMAGEM
function exportar() {
    html2canvas(document.getElementById("ficha")).then(canvas => {
        const a = document.createElement("a");
        a.download = "personagem.png";
        a.href = canvas.toDataURL();
        a.click();
    });
}

window.onload = carregar;

</script>

</body>
</html>
