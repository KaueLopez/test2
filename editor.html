<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ficha Assimilação RPG</title>

<style>
body {
    font-family: Arial;
    margin: 20px;
    background: #000;
    color: white;
}

/* CONTAINER */
.box {
    border: 1px solid #333;
    padding: 15px;
    background: #0b0b0b;
    border-radius: 10px;
}

/* INPUTS */
input, textarea {
    width: 100%;
    margin-bottom: 10px;
    padding: 10px;
    border: none;
    border-radius: 6px;
    background: #fff;
    color: #000;
    font-size: 14px;
    box-sizing: border-box;
}

textarea {
    min-height: 70px;
}

/* TITULOS (Instintos, etc.) */
h3 {
    background: #2a2a2a;
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 14px;
    margin: 15px 0 10px;
    color: #fff;
}

/* GRID */
.grid2x3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 15px;
}

/* CAIXA DO ATRIBUTO */
.grid2x3 > div {
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* LABEL DO ATRIBUTO */
.grid2x3 .label {
    background: #3a3a3a;
    color: #fff;
    font-size: 12px;
    padding: 4px 6px;
    border-radius: 4px;
    margin-top: 5px;
    width: 100%;
    text-align: center;
}

/* INPUT DENTRO DO GRID */
.grid2x3 input {
    text-align: center;
    font-weight: bold;
}

/* HP ESPECIAL */
#hp_atual, #hp_max {
    background: #ff2b2b;
    color: #000;
    font-weight: bold;
}

/* BOTÃO */
button {
    padding: 10px;
    margin-top: 10px;
    background: #222;
    color: white;
    border: 1px solid #444;
    border-radius: 6px;
}
</style>
</head>

<body>

<h2>Editor de Ficha</h2>

<div class="box">

<input id="nome" placeholder="Nome">
<textarea id="evento" placeholder="Evento Marcante"></textarea>
<input id="social" placeholder="Posição Social">

<h3>Saúde (HP)</h3>
<div class="grid2x3">
    <input id="hp_atual" type="number">
    <input id="hp_max" type="number">
    <div>HP Atual</div>
    <div>HP Máximo</div>
</div>

<h3>Instintos</h3>
<div class="grid2x3">
    <input id="reacao" type="number">
    <input id="percepcao" type="number">
    <input id="sagacidade" type="number">
    <div>Reação</div>
    <div>Percepção</div>
    <div>Sagacidade</div>
</div>

<div class="grid2x3">
    <input id="potencia" type="number">
    <input id="influencia" type="number">
    <input id="resolucao" type="number">
    <div>Potência</div>
    <div>Influência</div>
    <div>Resolução</div>
</div>

<h3>Conhecimentos</h3>
<div class="grid2x3">
    <input id="agrario" type="number">
    <input id="biologico" type="number">
    <input id="exato" type="number">
    <div>Agrário</div>
    <div>Biológico</div>
    <div>Exato</div>
</div>

<div class="grid2x3">
    <input id="medicina" type="number">
    <input id="social2" type="number">
    <input id="artistico" type="number">
    <div>Medicina</div>
    <div>Social</div>
    <div>Artístico</div>
</div>

<h3>Práticas</h3>
<div class="grid2x3">
    <input id="esportivas" type="number">
    <input id="ferramentas" type="number">
    <input id="oficios" type="number">
    <div>Esportivas</div>
    <div>Ferramentas</div>
    <div>Ofícios</div>
</div>

<div class="grid2x3">
    <input id="armas" type="number">
    <input id="veiculos" type="number">
    <input id="infiltracao" type="number">
    <div>Armas</div>
    <div>Veículos</div>
    <div>Infiltração</div>
</div>

<h3>Características</h3>
<textarea id="caracteristicas"></textarea>

<h3>Equipamentos</h3>
<textarea id="equipamentos"></textarea>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBp6FWCK0IYmeAbCMjdyStz5z1xeUvieV4",
  authDomain: "fichasrpg-45934.firebaseapp.com",
  databaseURL: "https://fichasrpg-45934-default-rtdb.firebaseio.com",
  projectId: "fichasrpg-45934",
  storageBucket: "fichasrpg-45934.firebasestorage.app",
  messagingSenderId: "523682127281",
  measurementId: "G-L22V165GJX"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.db = db;
window.ref = ref;
window.set = set;
window.get = get;
window.child = child;
</script>

<script>
let idAtual = new URLSearchParams(window.location.search).get("id");
let carregando = true;

function salvar() {
    if (!idAtual || carregando) return;

    set(ref(db, "personagens/" + idAtual), {
        id: idAtual,
        nome: document.getElementById("nome").value || "",
        evento: document.getElementById("evento").value || "",
        social: document.getElementById("social").value || "",

        saude: {
            hp_atual: Number(document.getElementById("hp_atual").value) || 0,
            hp_max: Number(document.getElementById("hp_max").value) || 0
        }
    });
}

function carregar() {
    if (!idAtual) return;

    get(child(ref(db), "personagens/" + idAtual)).then(snapshot => {
        if (!snapshot.exists()) {
            carregando = false;
            return;
        }

        const p = snapshot.val();

        document.getElementById("nome").value = p.nome || "";
        document.getElementById("evento").value = p.evento || "";
        document.getElementById("social").value = p.social || "";

        document.getElementById("hp_atual").value = p.saude?.hp_atual || "";
        document.getElementById("hp_max").value = p.saude?.hp_max || "";

        carregando = false;
    });
}

document.querySelectorAll("input, textarea").forEach(el => {
    el.addEventListener("input", () => {
        if (carregando) return;
        clearTimeout(window.t);
        window.t = setTimeout(salvar, 500);
    });
});

window.onload = carregar;
</script>

</body>
</html>
