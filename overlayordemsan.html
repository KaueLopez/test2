<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
    margin: 0;
    background: transparent;
    font-family: "Times New Roman";
}

.overlay {
    position: absolute;
    bottom: 30px;
    left: 30px;
    color: white;
    text-shadow: 1px 1px 3px black;
}

.nome {
    font-size: 48px;
    font-weight: bold;
    margin-bottom: 6px;

    color: #ffffff;
    text-shadow:
        0 0 2px #ff1a1a,
        0 0 6px #ff1a1a,
        0 0 12px #ff1a1a,
        0 0 20px #ff1a1a;
}
.stat {
    font-size: 28px;
    font-family: "lobster", serif;

    color: #9B111E;
    text-shadow:
        0 0 2px #960018,
        0 0 6px #960018;
}  
.stat1 {
    font-size: 28px;
    font-family: "lobster", serif;

    color: #FFFFFF;
    text-shadow:
        0 0 2px #7F00FF,
        0 0 6px #7F00FF;
}
.stat2 {
    font-size: 28px;
    font-family: "lobster", serif;

    color: #FFFFFF;
    text-shadow:
        0 0 2px #E4D00A,
        0 0 6px #E4D00A;
    
}
</style>
</head>

<body>

<div class="overlay">
    <div class="nome" id="nome">Carregando...</div>

    <div class="stat" id="hp"> 0 / 0</div>
    <div class="stat1" id="san"> 0 / 0</div>
    <div class="stat2" id="pe"> 0 / 0</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBp6FWCK0IYmeAbCMjdyStz5z1xeUvieV4",
  authDomain: "fichasrpg-45934.firebaseapp.com",
  databaseURL: "https://fichasrpg-45934-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const id = new URLSearchParams(location.search).get("id");

if (!id) {
    console.error("ID não encontrado na URL");
}

const nomeEl = document.getElementById("nome");
const hpEl = document.getElementById("hp");
const sanEl = document.getElementById("san");
const peEl = document.getElementById("pe");

onValue(ref(db, "personagens/" + id), (snap) => {
    const p = snap.val();
    if (!p || !p.dados) return;

    const info = p.dados.info || {};
    const c = p.dados.combate || {};

    nomeEl.textContent = info.nome || "Sem nome";

    hpEl.textContent = `${c.hp_atual ?? 0} / ${c.hp_max ?? 0}`;
    sanEl.textContent = `${c.sanidade_atual ?? 0} / ${c.sanidade_max ?? 0}`;
    peEl.textContent = `${c.pe_atual ?? 0} / ${c.pe_max ?? 0}`;
});

</script>

</body>
</html>
