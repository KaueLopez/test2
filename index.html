<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel RPG</title>

<style>
body {
    font-family: Arial;
    margin: 20px;
}

button {
    padding: 10px;
    margin-bottom: 10px;
}

.card {
    border: 1px solid #ccc;
    padding: 10px;
    margin-bottom: 5px;
    cursor: pointer;
}
</style>
</head>

<body>

<h2>Painel de Personagens</h2>

<button onclick="criarPersonagem()">➕ Criar Personagem</button>
<button onclick="carregar()">🔄 Atualizar</button>

<div id="lista"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBp6FWCK0IYmeAbCMjdyStz5z1xeUvieV4",
  authDomain: "fichasrpg-45934.firebaseapp.com",
  databaseURL: "https://fichasrpg-45934-default-rtdb.firebaseio.com",
  projectId: "fichasrpg-45934",
  storageBucket: "fichasrpg-45934.firebasestorage.app",
  messagingSenderId: "523682127281",
  measurementId: "G-L22V165GJX"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.db = db;
window.ref = ref;
window.set = set;
window.get = get;
window.child = child;
</script>

<script>

// 🔢 CRIA ID NUMÉRICO SEQUENCIAL
async function criarPersonagem() {

    const contadorRef = ref(db, "contadorPersonagens");
    const snapshot = await get(contadorRef);

    let id = 1;

    if (snapshot.exists()) {
        id = snapshot.val() + 1;
    }

    // atualiza contador global
    await set(contadorRef, id);

    // cria personagem
    await set(ref(db, "personagens/" + id), {
        id: id,
        nome: "Novo Personagem",
        evento: "",
        social: ""
    });

    carregar();
}

// 📋 LISTA PERSONAGENS
function carregar() {
    get(child(ref(db), "personagens")).then(snapshot => {

        const lista = document.getElementById("lista");
        lista.innerHTML = "";

        if (!snapshot.exists()) {
            lista.innerHTML = "<p>Sem personagens</p>";
            return;
        }

        const data = snapshot.val();

        Object.keys(data).forEach(id => {
            const p = data[id];

            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
                <strong>${p.nome}</strong><br>
                ID: ${id}
            `;

            div.onclick = () => {
                window.location.href = "editor.html?id=" + id;
            };

            lista.appendChild(div);
        });
    });
}

window.onload = carregar;

</script>

</body>
</html>
