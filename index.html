<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gerenciador RPG</title>

<style>
body {
    font-family: Arial;
    margin: 20px;
    background: #111;
    color: white;
}

button {
    padding: 10px;
    margin-bottom: 10px;
    cursor: pointer;
}

.card {
    border: 1px solid #333;
    background: #1a1a1a;
    padding: 10px;
    margin-bottom: 8px;
    cursor: pointer;
    border-radius: 6px;
}

.card:hover {
    background: #222;
}

small {
    color: #aaa;
}
</style>
</head>

<body>

<h2>Gerenciador de Personagens</h2>

<!-- CRIAÇÃO -->
<button onclick="criarPersonagem('assimilar')">➕ Criar Assimilação</button>
<button onclick="criarPersonagem('ordem')">➕ Criar Ordem Paranormal</button>
<button onclick="carregar()">🔄 Atualizar</button>

<div id="lista"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBp6FWCK0IYmeAbCMjdyStz5z1xeUvieV4",
  authDomain: "fichasrpg-45934.firebaseapp.com",
  databaseURL: "https://fichasrpg-45934-default-rtdb.firebaseio.com",
  projectId: "fichasrpg-45934",
  storageBucket: "fichasrpg-45934.firebasestorage.app",
  messagingSenderId: "523682127281",
  measurementId: "G-L22V165GJX"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.db = db;
window.ref = ref;
window.set = set;
window.get = get;
window.child = child;
</script>

<script>

async function criarPersonagem(sistema) {

    const contadorRef = ref(db, "contadorPersonagens");
    const snapshot = await get(contadorRef);

    let id = snapshot.exists() ? snapshot.val() + 1 : 1;

    await set(contadorRef, id);

    // 🔥 ASSIMILAÇÃO (modelo antigo)
    if (sistema === "assimilar") {
        await set(ref(db, "personagens/" + id), {
            id: id,
            tipo: "assimilar",
            nome: "Novo Personagem",
            evento: "",
            social: ""
        });
    }

    // 🔥 ORDEM PARANORMAL (modelo novo)
    if (sistema === "ordem") {
        await set(ref(db, "personagens/" + id), {
            id: id,
            tipo: "ordem",
            dados: {
                info: {
                    nome: "",
                    origem: "",
                    classe: ""
                },
                atributos: {
                    agi: 0,
                    for: 0,
                    int: 0,
                    vig: 0,
                    pre: 0,
                    nivel: 0,
                    nex: 0
                },
                combate: {
                    hp_max: 0,
                    hp_atual: 0,
                    defesa: 0
                }
            }
        });
    }

    carregar();
}

function carregar() {
    get(child(ref(db), "personagens")).then(snapshot => {

        const lista = document.getElementById("lista");
        lista.innerHTML = "";

        if (!snapshot.exists()) {
            lista.innerHTML = "<p>Nenhum personagem encontrado</p>";
            return;
        }

        const data = snapshot.val();

        Object.keys(data).forEach(id => {
            const p = data[id];

            const tipo = p.tipo || "desconhecido";

            let sistema = "";

            if (tipo === "assimilar") sistema = "Assimilação";
            if (tipo === "ordem") sistema = "Ordem Paranormal";

            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
                <strong>${p.nome || "Sem nome"}</strong><br>
                <small>ID: ${id}</small><br>
                <small>Sistema: ${sistema}</small>
            `;

            div.onclick = () => {

                if (tipo === "ordem") {
                    window.location.href = "editor-novo.html?id=" + id;
                }

                if (tipo === "assimilar") {
                    window.location.href = "editor-antigo.html?id=" + id;
                }
            };

            lista.appendChild(div);
        });
    });
}

window.onload = carregar;

</script>

</body>
</html>
