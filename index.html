<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
html, body {
    background: transparent;
    margin: 0;
    color: white;
    font-family: Arial;
}

.hp-bar {
    width: 200px;
    height: 18px;
    background: #333;
}

.hp-fill {
    height: 100%;
    background: red;
}
</style>
</head>

<body>

<h2 id="nome"></h2>
<div class="hp-bar">
    <div id="hp" class="hp-fill"></div>
</div>
<p id="texto"></p>

<script>

// 🔥 CONFIG DO FIREBASE (pega no console)
const firebaseConfig = {
  apiKey: "AIzaSyBp6FWCK0IYmeAbCMjdyStz5z1xeUvieV4",
  authDomain: "fichasrpg-45934.firebaseapp.com",
  databaseURL: "https://fichasrpg-45934-default-rtdb.firebaseio.com",
  projectId: "fichasrpg-45934"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// pega ID da URL (?id=1)
const params = new URLSearchParams(window.location.search);
const id = params.get("id") || "1";

const ref = db.ref("players/" + id);

// 🔥 TEMPO REAL (sem delay)
ref.on("value", snapshot => {
    const data = snapshot.val();

    if (!data) return;

    let hp = data.hp;
    let max = data.max;

    document.getElementById("nome").innerText = data.nome;
    document.getElementById("texto").innerText = `${hp} / ${max}`;

    let porcentagem = (hp / max) * 100;
    document.getElementById("hp").style.width = porcentagem + "%";
});
</script>

</body>
</html>
