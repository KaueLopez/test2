<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body { background: transparent; color: white; font-family: Arial; }

.card {
    width: 250px;
}

.hp-bar {
    width: 100%;
    height: 18px;
    background: #333;
}

.hp-fill {
    height: 100%;
    background: red;
    width: 100%;
    transition: 0.5s;
}
</style>
</head>

<body>

<div class="card">
    <h2 id="nome">...</h2>

    <div class="hp-bar">
        <div id="hp" class="hp-fill"></div>
    </div>

    <p id="texto"></p>
</div>

<script>
const url = "https://opensheet.elk.sh/1YdYNlO22v4JD_qlTx-PZBppwqpTD14ib3Q-h_QpPOio/Página1";

function atualizar() {
    fetch(url)
    .then(res => res.json())
    .then(data => {
        let player = data[0]; // muda o índice pra cada jogador

        let hp = parseInt(player.HP);
        let max = parseInt(player.MAX);

        document.getElementById("nome").innerText = player.Nome;

        let porcentagem = (hp / max) * 100;
        document.getElementById("hp").style.width = porcentagem + "%";

        document.getElementById("texto").innerText = hp + " / " + max;
    });
}

// atualiza a cada 2 segundos
setInterval(atualizar, 2000);

atualizar();
</script>

</body>
</html>
