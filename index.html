<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>

html, body {
    background: rgba(0,0,0,0);
    margin: 0;
    padding: 0;
    color: white;
    font-family: Arial;
}

.card {
    width: 250px;
}

.hp-bar {
    width: 100%;
    height: 18px;
    background: #333;
    border-radius: 4px;
    overflow: hidden;
}

.hp-fill {
    height: 100%;
    background: red;
    width: 100%;
    transition: width 0.3s ease;
}

</style>
</head>

<body>

<div class="card">
    <h2 id="nome">Carregando...</h2>

    <div class="hp-bar">
        <div id="hp" class="hp-fill"></div>
    </div>

    <p id="texto">...</p>
</div>

<script>
const url = "https://opensheet.elk.sh/1YdYNlO22v4JD_qlTx-PZBppwqpTD14ib3Q-h_QpPOio/P%C3%A1gina1";

async function atualizar() {
    try {
        // 🔥 evita cache
        const res = await fetch(url + "?t=" + Date.now());
        const data = await res.json();

        if (!data || data.length === 0) return;

        const player = data[0];

        const nome = player.Nome || player.nome || "Sem nome";
        let hp = parseInt(player.HP || player.hp || 0);
        let max = parseInt(player.MAX || player.max || 1);

        if (isNaN(hp)) hp = 0;
        if (isNaN(max) || max <= 0) max = 1;

        // 🔥 limita valores
        hp = Math.max(0, Math.min(hp, max));

        // atualiza nome
        document.getElementById("nome").innerText = nome;

        // barra
        const porcentagem = (hp / max) * 100;
        document.getElementById("hp").style.width = porcentagem + "%";

        // texto
        document.getElementById("texto").innerText = `${hp} / ${max}`;

        // 🔥 cor dinâmica
        let cor = "red";
        if (hp / max > 0.6) cor = "lime";
        else if (hp / max > 0.3) cor = "yellow";

        document.getElementById("hp").style.background = cor;

    } catch (err) {
        console.error("Erro:", err);
    }
}

// 🔥 loop melhor que setInterval
async function loop() {
    await atualizar();
    setTimeout(loop, 1000); // 1 segundo (ideal)
}

loop();
</script>

</body>
</html>
