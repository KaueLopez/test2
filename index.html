<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel RPG</title>

<style>
body {
    font-family: Arial;
    margin: 20px;
}

h1 {
    margin-bottom: 20px;
}

button {
    padding: 10px;
    margin-bottom: 10px;
    cursor: pointer;
}

#lista {
    margin-top: 20px;
}

.card {
    border: 1px solid #ccc;
    padding: 10px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: 0.2s;
}

.card:hover {
    background: #f2f2f2;
}
</style>

</head>

<body>

<h1>Painel de Personagens</h1>

<button onclick="criarPersonagem()">➕ Criar Novo Personagem</button>
<button onclick="carregar()">🔄 Atualizar Lista</button>

<div id="lista"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, child, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBp6FWCK0IYmeAbCMjdyStz5z1xeUvieV4",
  authDomain: "fichasrpg-45934.firebaseapp.com",
  databaseURL: "https://fichasrpg-45934-default-rtdb.firebaseio.com",
  projectId: "fichasrpg-45934",
  storageBucket: "fichasrpg-45934.firebasestorage.app",
  messagingSenderId: "523682127281",
  measurementId: "G-L22V165GJX"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.db = db;
window.ref = ref;
window.set = set;
window.get = get;
window.child = child;
window.push = push;
</script>

<script>

// ➕ CRIAR PERSONAGEM
function criarPersonagem() {
    const novoRef = push(ref(db, "personagens"));

    const personagem = {
        id: novoRef.key,
        nome: "Novo Personagem",
        evento: "",
        social: ""
    };

    set(novoRef, personagem).then(() => {
        carregar();
    });
}

// 📋 CARREGAR LISTA
function carregar() {
    get(child(ref(db), "personagens")).then(snapshot => {
        const lista = document.getElementById("lista");
        lista.innerHTML = "";

        if (!snapshot.exists()) {
            lista.innerHTML = "<p>Nenhum personagem encontrado</p>";
            return;
        }

        const data = snapshot.val();

        Object.keys(data).forEach(id => {
            const p = data[id];

            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
                <strong>${p.nome}</strong><br>
                <small>ID: ${id}</small>
            `;

            div.onclick = () => {
                window.location.href = "editor.html?id=" + id;
            };

            lista.appendChild(div);
        });
    });
}

window.onload = carregar;

</script>

</body>
</html>
