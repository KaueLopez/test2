<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>

/* 🔥 força transparência real */
html, body {
    background: rgba(0,0,0,0);
    margin: 0;
    padding: 0;
    color: white;
    font-family: Arial;
}

/* remove qualquer fundo escondido */
* {
    box-sizing: border-box;
}

.card {
    width: 250px;
}

/* barra continua visível (isso NÃO quebra transparência) */
.hp-bar {
    width: 100%;
    height: 18px;
    background: #333;
    border-radius: 4px;
    overflow: hidden;
}

.hp-fill {
    height: 100%;
    background: red;
    width: 100%;
    transition: 0.5s;
}

</style>
</head>

<body>

<div class="card">
    <h2 id="nome">Carregando...</h2>

    <div class="hp-bar">
        <div id="hp" class="hp-fill"></div>
    </div>

    <p id="texto">...</p>
</div>

<script>
const url = "https://opensheet.elk.sh/1YdYNlO22v4JD_qlTx-PZBppwqpTD14ib3Q-h_QpPOio/P%C3%A1gina1";

function atualizar() {
    fetch(url)
    .then(res => res.json())
    .then(data => {

        if (!data || data.length === 0) return;

        let player = data[0];

        let nome = player.Nome || player.nome || "Sem nome";
        let hp = parseInt(player.HP || player.hp || 0);
        let max = parseInt(player.MAX || player.max || 1);

        if (max <= 0) max = 1;

        document.getElementById("nome").innerText = nome;

        let porcentagem = (hp / max) * 100;
        document.getElementById("hp").style.width = porcentagem + "%";

        document.getElementById("texto").innerText = `${hp} / ${max}`;
    })
    .catch(err => {
        console.error("Erro ao buscar dados:", err);
    });
}

setInterval(atualizar, 2000);
atualizar();
</script>

</body>
</html>
