<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
    margin: 0;
    background: transparent;
    font-family: "Segoe UI", sans-serif;
}

/* CONTAINER */
.overlay {
    position: absolute;
    bottom: 30px;
    left: 30px;

    color: white;
    text-shadow: 1px 1px 3px black;
}

/* NOME */
.nome {
    font-size: 48px;
    font-weight: bold;
    margin-bottom: 6px;

    color: #FFFFFF;
    text-shadow:
        0 0 2px #ff1a1a,
        0 0 6px #ff1a1a,
        0 0 12px #ff1a1a,
        0 0 20px #ff1a1a;
}

/* HP */
.stat {
    font-size: 28px;

    color: #9B111E;
    text-shadow:
        0 0 12px #960018,
        0 0 24px #960018;
}
</style>
</head>

<body>

<div class="overlay">
    <div class="nome" id="nome">Carregando...</div>
    <div class="stat" id="hp">0 / 0</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBp6FWCK0IYmeAbCMjdyStz5z1xeUvieV4",
  authDomain: "fichasrpg-45934.firebaseapp.com",
  databaseURL: "https://fichasrpg-45934-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ID */
const id = new URLSearchParams(location.search).get("id");

console.log("ID:", id);

if (!id) {
    console.error("ID não encontrado na URL");
}

/* ELEMENTOS */
const nomeEl = document.getElementById("nome");
const hpEl = document.getElementById("hp");

/* FIREBASE */
onValue(ref(db, "personagens/" + id), (snap) => {

    const p = snap.val();
    console.log("DADOS:", p);

    if (!p || !p.dados) return;

    const info = p.dados.info || {};
    const c = p.dados.combate || {};

    nomeEl.textContent = info.nome || "Sem nome";

    const hpAtual = c.hp_atual ?? 0;
    const hpMax = c.hp_max ?? 0;

    hpEl.textContent = `${hpAtual} / ${hpMax}`;
});
</script>

</body>
</html>
