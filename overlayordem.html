<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
    margin: 0;
    background: transparent;
    font-family: "Times New Roman", Times, serif;
}

/* CONTAINER */
.overlay {
    position: absolute;
    bottom: 30px;
    left: 30px;
}

/* NOME (NEON VERMELHO FORTE) */
.nome {
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 6px;

    color: #ff1a1a;
    text-shadow:
        0 0 5px #ff1a1a,
        0 0 10px #ff1a1a,
        0 0 20px #ff1a1a,
        0 0 40px #ff1a1a;

    animation: pulseRed 2s infinite;
}

/* STATUS (HP) */
.stat {
    font-size: 18px;

    color: #ffffff;
    text-shadow:
        0 0 3px #ff1a1a,
        0 0 8px #ff1a1a;
}

/* ANIMAÇÃO PULSO */
@keyframes pulseRed {
    0%, 100% {
        text-shadow:
            0 0 5px #ff1a1a,
            0 0 10px #ff1a1a,
            0 0 20px #ff1a1a;
    }

    50% {
        text-shadow:
            0 0 2px #ff1a1a,
            0 0 6px #ff1a1a,
            0 0 12px #ff1a1a;
    }
}
</style>

</head>

<body>

<div class="overlay">
    <div class="nome" id="nome">Carregando...</div>
    <div class="stat" id="hp">HP: 0 / 0</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBp6FWCK0IYmeAbCMjdyStz5z1xeUvieV4",
  authDomain: "fichasrpg-45934.firebaseapp.com",
  databaseURL: "https://fichasrpg-45934-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const id = new URLSearchParams(location.search).get("id");

const nomeEl = document.getElementById("nome");
const hpEl = document.getElementById("hp");

if (!id) {
    nomeEl.textContent = "ID não encontrado";
}

/* LIVE SYNC */
onValue(ref(db, "personagens/" + id), (snap) => {
    const p = snap.val();
    if (!p || !p.dados) return;

    const info = p.dados.info || {};
    const c = p.dados.combate || {};

    nomeEl.textContent = info.nome || "Sem nome";
    hpEl.textContent = `HP: ${c.hp_atual ?? 0} / ${c.hp_max ?? 0}`;
});
</script>

</body>
</html>
