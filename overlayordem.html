<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
    margin: 0;
    background: transparent;
    font-family: "Segoe UI", sans-serif;
}

/* CONTAINER */
.overlay {
    position: absolute;
    bottom: 30px;
    left: 30px;

    display: flex;
    align-items: center;
    gap: 15px;
}

/* IMAGEM */
#portrait {
    width: 120px;
    height: 120px;
    object-fit: cover;
    transition: 0.3s;
}

/* BLOCO DE INFO */
.info {
    display: flex;
    flex-direction: column;
}

/* NOME */
.nome {
    font-size: 48px;
    font-weight: bold;

    color: #FFFFFF;
    text-shadow:
        0 0 2px #ff1a1a,
        0 0 6px #ff1a1a,
        0 0 12px #ff1a1a,
        0 0 20px #ff1a1a;
}
</style>

</head>

<body>

<div class="overlay">

    <img id="portrait" src="Adelaide.png">

    <div class="info">
        <div class="nome" id="nome">Carregando...</div>
    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBp6FWCK0IYmeAbCMjdyStz5z1xeUvieV4",
  authDomain: "fichasrpg-45934.firebaseapp.com",
  databaseURL: "https://fichasrpg-45934-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const id = new URLSearchParams(location.search).get("id");

const nomeEl = document.getElementById("nome");
const portrait = document.getElementById("portrait");

/* LIVE UPDATE */
onValue(ref(db, "personagens/" + id), (snap) => {
    const p = snap.val();
    if (!p || !p.dados) return;

    const info = p.dados.info || {};
    const c = p.dados.combate || {};

    nomeEl.textContent = info.nome || "Sem nome";

    const hpAtual = c.hp_atual ?? 0;
    const hpMax = c.hp_max ?? 1;

    const porcentagem = hpAtual / hpMax;

    let novaImagem = "Adelaide.png";

    if (porcentagem <= 0.3) {
        novaImagem = "AdelaideMachucada.png";
    } else if (porcentagem <= 0.5) {
        novaImagem = "AdelaideMachucada.png";
    }

    // evita troca desnecessária
    if (!portrait.src.includes(novaImagem)) {
        portrait.src = novaImagem;
    }
});
</script>

</body>
</html>
