<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
    margin: 0;
    background: transparent;
    font-family: "Segoe UI", sans-serif;
}

/* CONTAINER */
.overlay {
    position: absolute;
    bottom: 30px;
    left: 30px;

    display: flex;
    align-items: center;
    gap: 20px;
}

/* IMAGEM (DOBRO DO TAMANHO) */
#portrait {
    width: 240px;
    height: 240px;
    object-fit: cover;

    /* animação base */
    animation: flutuar 3s ease-in-out infinite;
}

/* BLOCO DE INFO */
.info {
    display: flex;
    flex-direction: column;
}

/* NOME */
.nome {
    font-size: 48px;
    font-weight: bold;

    color: #FFFFFF;
    text-shadow:
        0 0 2px #ff1a1a,
        0 0 6px #ff1a1a,
        0 0 12px #ff1a1a,
        0 0 20px #ff1a1a;
}

@keyframes flutuar {
    0% {
        transform: translateY(0px) scaleY(1);
    }
    50% {
        transform: translateY(-8px) scaleY(0.99); /* levemente achatado */
    }
    100% {
        transform: translateY(0px) scaleY(1);
    }
}

/* TREMER QUANDO CRÍTICO */
.critico {
    animation: flutuar 3s ease-in-out infinite, tremer 0.15s infinite;
}

@keyframes tremer {
    0% { transform: translate(0px, 0px); }
    25% { transform: translate(3px, -3px); }
    50% { transform: translate(-3px, 3px); }
    75% { transform: translate(3px, 3px); }
    100% { transform: translate(0px, 0px); }
}
</style>

</head>

<body>

<div class="overlay">

    <img id="portrait" src="Adelaide.png">

    <div class="info">
        <div class="nome" id="nome">Carregando...</div>
    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBp6FWCK0IYmeAbCMjdyStz5z1xeUvieV4",
  authDomain: "fichasrpg-45934.firebaseapp.com",
  databaseURL: "https://fichasrpg-45934-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const id = new URLSearchParams(location.search).get("id");

const nomeEl = document.getElementById("nome");
const portrait = document.getElementById("portrait");

/* LIVE UPDATE */
onValue(ref(db, "personagens/" + id), (snap) => {
    const p = snap.val();
    if (!p || !p.dados) return;

    const info = p.dados.info || {};
    const c = p.dados.combate || {};

    nomeEl.textContent = info.nome || "Sem nome";

    const hpAtual = c.hp_atual ?? 0;
    const hpMax = c.hp_max ?? 1;

    const porcentagem = hpAtual / hpMax;

    let novaImagem = "Adelaide.png";

    // remove estado anterior
    portrait.classList.remove("critico");

    if (porcentagem <= 0.3) {
        novaImagem = "Adelaide.png";
        portrait.classList.add("critico");
    } else if (porcentagem <= 0.5) {
        novaImagem = "Adelaide.png";
    }

    // evita troca desnecessária
    if (!portrait.src.includes(novaImagem)) {
        portrait.src = novaImagem;
    }
});
</script>

</body>
</html>
