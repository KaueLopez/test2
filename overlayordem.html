<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
    margin: 0;
    background: transparent;
    font-family: Arial;
}

.overlay {
    position: absolute;
    bottom: 30px;
    left: 30px;
    color: white;
    text-shadow: 1px 1px 3px black;
}

.nome {
    font-size: 28px;
    font-weight: bold;
}

.stat {
    font-size: 18px;
    margin-top: 4px;
}

.toggle {
    margin-top: 10px;
    font-size: 12px;
    padding: 5px 10px;
    background: rgba(255,255,255,0.15);
    display: inline-block;
    border-radius: 6px;
    cursor: pointer;
    user-select: none;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
}

.pulse {
    animation: pulse 0.3s ease;
}
</style>
</head>

<body>

<div class="overlay">
    <div class="nome" id="nome">Carregando...</div>

    <div class="stat" id="hp">HP: 0 / 0</div>
    <div class="stat" id="san">SAN: 0 / 0</div>
    <div class="stat" id="pe">PE: 0 / 0</div>
    <div class="stat" id="pd">PD: 0 / 0</div>

    <div class="toggle" id="toggle">Modo PD: OFF</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBp6FWCK0IYmeAbCMjdyStz5z1xeUvieV4",
  authDomain: "fichasrpg-45934.firebaseapp.com",
  databaseURL: "https://fichasrpg-45934-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const id = new URLSearchParams(location.search).get("id");

let modoPD = false;

/* ELEMENTOS */
const nomeEl = document.getElementById("nome");
const hpEl = document.getElementById("hp");
const sanEl = document.getElementById("san");
const peEl = document.getElementById("pe");
const pdEl = document.getElementById("pd");
const toggle = document.getElementById("toggle");

/* BOTÃO TOGGLE */
toggle.onclick = () => {
    modoPD = !modoPD;
    toggle.innerText = "Modo PD: " + (modoPD ? "ON" : "OFF");
};

/* ANIMAÇÃO */
function anim(el) {
    el.classList.remove("pulse");
    void el.offsetWidth;
    el.classList.add("pulse");
}

/* FIREBASE */
onValue(ref(db, "personagens/" + id), (snap) => {
    const p = snap.val();
    if (!p) return;

    const info = p.dados?.info || {};
    const c = p.dados?.combate || {};

    const nome = info.nome || "Sem nome";

    const hpAtual = c.hp_atual || 0;
    const hpMax = c.hp_max || 0;

    const sanAtual = c.sanidade_atual || 0;
    const sanMax = c.sanidade_max || 0;

    const peAtual = c.pe_atual || 0;
    const peMax = c.pe_max || 0;

    const pd = c.pd_turno || 0;

    /* NOME */
    if (nomeEl.textContent !== nome) {
        nomeEl.textContent = nome;
        anim(nomeEl);
    }

    /* HP SEMPRE */
    hpEl.textContent = `HP: ${hpAtual} / ${hpMax}`;

    if (!modoPD) {
        /* MODO NORMAL */
        sanEl.style.display = "block";
        peEl.style.display = "block";
        pdEl.style.display = "none";

        sanEl.textContent = `SAN: ${sanAtual} / ${sanMax}`;
        peEl.textContent = `PE: ${peAtual} / ${peMax}`;
    } else {
        /* MODO PD */
        sanEl.style.display = "none";
        peEl.style.display = "none";
        pdEl.style.display = "block";

        pdEl.textContent = `PD: ${pd} / turno`;
    }
});
</script>

</body>
</html>
