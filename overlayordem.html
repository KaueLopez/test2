<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
    margin: 0;
    background: transparent;
    font-family: "Times New Roman", Times, serif;
}

/* CONTAINER */
.overlay {
    position: absolute;
    bottom: 30px;
    left: 30px;
}

/* NOME (BRANCO + NEON NO CONTORNO) */
.nome {
    font-size: 48px;
    font-weight: bold;
    margin-bottom: 6px;
    Font-family: "Times New Roman", serif;

    color: #FFFFFF;
    text-shadow:
        0 0 2px #ff1a1a,
        0 0 6px #ff1a1a,
        0 0 12px #ff1a1a,
        0 0 20px #ff1a1a;
}
    
</style>

</head>

<body>

<div class="overlay">
    <div class="nome" id="nome">Carregando...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBp6FWCK0IYmeAbCMjdyStz5z1xeUvieV4",
  authDomain: "fichasrpg-45934.firebaseapp.com",
  databaseURL: "https://fichasrpg-45934-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const id = new URLSearchParams(location.search).get("id");

const nomeEl = document.getElementById("nome");

/* LIVE UPDATE */
onValue(ref(db, "personagens/" + id), (snap) => {
    const p = snap.val();
    if (!p || !p.dados) return;

    const info = p.dados.info || {};
 

    nomeEl.textContent = info.nome || "Sem nome";
});
</script>

</body>
</html>
