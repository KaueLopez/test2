<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ficha</title>

<style>
body {
    font-family: Arial;
    margin: 20px;
    background: #000;
    color: white;
}

.box {
    border: 1px solid #333;
    padding: 15px;
    background: #0b0b0b;
    border-radius: 10px;
}

input, textarea {
    width: 100%;
    margin-bottom: 10px;
    padding: 10px;
    border: none;
    border-radius: 6px;
    background: #fff;
    color: #000;
    font-size: 14px;
    box-sizing: border-box;
}

textarea {
    min-height: 70px;
    resize: vertical;
}

h3 {
    background: #2a2a2a;
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 14px;
    margin: 15px 0 10px;
    color: #fff;
}

.grid2x3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 15px;
}

.grid2x3 > div {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.label {
    background: #3a3a3a;
    color: #fff;
    font-size: 12px;
    padding: 4px 6px;
    border-radius: 4px;
    margin-top: 5px;
    width: 100%;
    text-align: center;
}

.grid2x3 input {
    text-align: center;
    font-weight: bold;
}

#hp_atual, #hp_max {
    background: #ff2b2b;
    color: #000;
    font-weight: bold;
}
</style>
</head>

<body>

<h2>Ficha Assimilação RPG</h2>

<div class="box">

<input id="nome" placeholder="Nome">
<textarea id="evento" placeholder="Evento Marcante"></textarea>
<input id="social" placeholder="Posição Social">

<h3>Saúde (HP)</h3>
<div class="grid2x3">
    <div>
        <input id="hp_atual" type="number">
        <div class="label">HP Atual</div>
    </div>
    <div>
        <input id="hp_max" type="number">
        <div class="label">HP Máximo</div>
    </div>
</div>

<h3>Instintos</h3>
<div class="grid2x3">
    <div><input id="reacao" type="number"><div class="label">Reação</div></div>
    <div><input id="percepcao" type="number"><div class="label">Percepção</div></div>
    <div><input id="sagacidade" type="number"><div class="label">Sagacidade</div></div>
</div>

<div class="grid2x3">
    <div><input id="potencia" type="number"><div class="label">Potência</div></div>
    <div><input id="influencia" type="number"><div class="label">Influência</div></div>
    <div><input id="resolucao" type="number"><div class="label">Resolução</div></div>
</div>

<h3>Conhecimentos</h3>
<div class="grid2x3">
    <div><input id="agrario" type="number"><div class="label">Agrário</div></div>
    <div><input id="biologico" type="number"><div class="label">Biológico</div></div>
    <div><input id="exato" type="number"><div class="label">Exato</div></div>
</div>

<div class="grid2x3">
    <div><input id="medicina" type="number"><div class="label">Medicina</div></div>
    <div><input id="social2" type="number"><div class="label">Social</div></div>
    <div><input id="artistico" type="number"><div class="label">Artístico</div></div>
</div>

<h3>Práticas</h3>
<div class="grid2x3">
    <div><input id="esportivas" type="number"><div class="label">Esportivas</div></div>
    <div><input id="ferramentas" type="number"><div class="label">Ferramentas</div></div>
    <div><input id="oficios" type="number"><div class="label">Ofícios</div></div>
</div>

<div class="grid2x3">
    <div><input id="armas" type="number"><div class="label">Armas</div></div>
    <div><input id="veiculos" type="number"><div class="label">Veículos</div></div>
    <div><input id="infiltracao" type="number"><div class="label">Infiltração</div></div>
</div>

<h3>Características</h3>
<textarea id="caracteristicas"></textarea>

<h3>Equipamentos</h3>
<textarea id="equipamentos"></textarea>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getDatabase,
  ref,
  set,
  get,
  child
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBp6FWCK0IYmeAbCMjdyStz5z1xeUvieV4",
  authDomain: "fichasrpg-45934.firebaseapp.com",
  databaseURL: "https://fichasrpg-45934-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const idAtual = new URLSearchParams(location.search).get("id");

let carregando = true;
let timeout = null;

/* helpers */
const $ = (id) => document.getElementById(id);

/* SAVE */
async function salvar() {
    if (!idAtual || carregando) return;

    await set(ref(db, "personagens/" + idAtual), {
        nome: $("nome").value || "",
        evento: $("evento").value || "",
        social: $("social").value || "",

        saude: {
            hp_atual: +$("hp_atual").value || 0,
            hp_max: +$("hp_max").value || 0
        },

        instintos: {
            reacao: +$("reacao").value || 0,
            percepcao: +$("percepcao").value || 0,
            sagacidade: +$("sagacidade").value || 0,
            potencia: +$("potencia").value || 0,
            influencia: +$("influencia").value || 0,
            resolucao: +$("resolucao").value || 0
        },

        conhecimentos: {
            agrario: +$("agrario").value || 0,
            biologico: +$("biologico").value || 0,
            exato: +$("exato").value || 0,
            medicina: +$("medicina").value || 0,
            social: +$("social2").value || 0,
            artistico: +$("artistico").value || 0
        },

        praticas: {
            esportivas: +$("esportivas").value || 0,
            ferramentas: +$("ferramentas").value || 0,
            oficios: +$("oficios").value || 0,
            armas: +$("armas").value || 0,
            veiculos: +$("veiculos").value || 0,
            infiltracao: +$("infiltracao").value || 0
        },

        caracteristicas: $("caracteristicas").value || "",
        equipamentos: $("equipamentos").value || ""
    });
}

/* LOAD */
async function carregar() {
    const snap = await get(child(ref(db), "personagens/" + idAtual));

    if (!snap.exists()) {
        carregando = false;
        return;
    }

    const p = snap.val();

    $("nome").value = p.nome || "";
    $("evento").value = p.evento || "";
    $("social").value = p.social || "";

    $("hp_atual").value = p.saude?.hp_atual || "";
    $("hp_max").value = p.saude?.hp_max || "";

    $("reacao").value = p.instintos?.reacao || "";
    $("percepcao").value = p.instintos?.percepcao || "";
    $("sagacidade").value = p.instintos?.sagacidade || "";
    $("potencia").value = p.instintos?.potencia || "";
    $("influencia").value = p.instintos?.influencia || "";
    $("resolucao").value = p.instintos?.resolucao || "";

    $("agrario").value = p.conhecimentos?.agrario || "";
    $("biologico").value = p.conhecimentos?.biologico || "";
    $("exato").value = p.conhecimentos?.exato || "";
    $("medicina").value = p.conhecimentos?.medicina || "";
    $("social2").value = p.conhecimentos?.social || "";
    $("artistico").value = p.conhecimentos?.artistico || "";

    $("esportivas").value = p.praticas?.esportivas || "";
    $("ferramentas").value = p.praticas?.ferramentas || "";
    $("oficios").value = p.praticas?.oficios || "";
    $("armas").value = p.praticas?.armas || "";
    $("veiculos").value = p.praticas?.veiculos || "";
    $("infiltracao").value = p.praticas?.infiltracao || "";

    $("caracteristicas").value = p.caracteristicas || "";
    $("equipamentos").value = p.equipamentos || "";

    carregando = false;
}

/* autosave anti-spam */
document.querySelectorAll("input, textarea").forEach(el => {
    el.addEventListener("input", () => {
        if (carregando) return;

        clearTimeout(timeout);
        timeout = setTimeout(salvar, 800);
    });
});

window.onload = carregar;
</script>

</body>
</html>
