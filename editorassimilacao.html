<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FICHA ASSIMILAÇÃO CODICE</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #000;
    color: white;
}

h2 {
    text-align: center;
    margin: 10px 0;
}

.tabs {
    display: flex;
    background: #1a1a1a;
}

.tabs button {
    flex: 1;
    padding: 14px;
    border: none;
    background: #1a1a1a;
    color: white;
    cursor: pointer;
}

.tab {
    display: none;
    padding: 12px;
}

.block {
    background: #0b0b0b;
    border: 1px solid #333;
    border-radius: 10px;
    padding: 15px;
    margin-bottom: 12px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border: none;
    border-radius: 6px;
    background: #fff;
    color: #000;
    font-size: 14px;
    box-sizing: border-box;
}

/* AUTO RESIZE */
textarea {
    min-height: 120px;
    resize: none;
    overflow: hidden;
}

h3 {
    background: #2a2a2a;
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 14px;
    margin: 15px 0 10px;
}

.grid2x3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 15px;
}

@media (max-width: 600px) {
    .grid2x3 {
        grid-template-columns: repeat(2, 1fr);
    }
}

.cell {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.label {
    background: #3a3a3a;
    color: #fff;
    font-size: 12px;
    padding: 4px 6px;
    border-radius: 4px;
    margin-top: 5px;
    width: 100%;
    text-align: center;
}

.cell input {
    text-align: center;
    font-weight: bold;
}

#hp_atual, #hp_max {
    background: #ff2b2b;
    color: #000;
    font-weight: bold;
}
</style>
</head>

<body>

<h2>FICHA ASSIMILAÇÃO CODICE</h2>

<div class="tabs">
    <button onclick="showTab('basico')">Básico</button>
    <button onclick="showTab('combate')">Combate</button>
    <button onclick="showTab('extras')">Extras</button>
</div>

<!-- BÁSICO -->
<div id="basico" class="tab">
    <div class="block">
        <input id="nome" placeholder="Nome">
        <textarea id="evento" placeholder="Evento Marcante"></textarea>
        <input id="social" placeholder="Posição Social">
    </div>
</div>

<!-- COMBATE -->
<div id="combate" class="tab">
<div class="block">

<h3>HP</h3>
<div class="grid2x3">
    <div class="cell"><input id="hp_atual" type="number"><div class="label">HP Atual</div></div>
    <div class="cell"><input id="hp_max" type="number"><div class="label">HP Máximo</div></div>
</div>

<h3>Recursos</h3>
<div class="grid2x3">
    <div class="cell"><input id="det_atual" type="number"><div class="label">Determinação Atual</div></div>
    <div class="cell"><input id="det_max" type="number"><div class="label">Determinação Máx</div></div>
</div>

<div class="grid2x3">
    <div class="cell"><input id="assim_atual" type="number"><div class="label">Assimilação Atual</div></div>
    <div class="cell"><input id="assim_max" type="number"><div class="label">Assimilação Máx</div></div>
</div>

</div>
</div>

<!-- EXTRAS -->
<div id="extras" class="tab">
    <div class="block">

        <h3>Habilidades</h3>
        <textarea id="habilidades"></textarea>

        <h3>Equipamentos</h3>
        <textarea id="equipamentos"></textarea>

    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({
  apiKey: "AIza...",
  authDomain: "...",
  databaseURL: "..."
});

const db = getDatabase(app);
const id = new URLSearchParams(location.search).get("id") || "default";

const $ = (i) => document.getElementById(i);

let carregando = true;
let timeout;

/* AUTO RESIZE */
function autoResize(el) {
    el.style.height = "auto";
    el.style.height = el.scrollHeight + "px";
}

/* SAVE COMPLETO */
function salvar() {
  if (carregando) return;

  set(ref(db, "personagens/" + id), {

    nome: $("nome").value || "",
    evento: $("evento").value || "",
    social: $("social").value || "",

    saude: {
      hp_atual: +$("hp_atual").value || 0,
      hp_max: +$("hp_max").value || 0,
      det_atual: +$("det_atual").value || 0,
      det_max: +$("det_max").value || 0,
      assim_atual: +$("assim_atual").value || 0,
      assim_max: +$("assim_max").value || 0
    },

    habilidades: $("habilidades").value || "",
    equipamentos: $("equipamentos").value || ""

  });
}

/* LOAD */
async function load() {
  const snap = await get(child(ref(db), "personagens/" + id));

  if (snap.exists()) {
    const p = snap.val();

    $("nome").value = p.nome || "";
    $("evento").value = p.evento || "";
    $("social").value = p.social || "";

    $("hp_atual").value = p.saude?.hp_atual || "";
    $("hp_max").value = p.saude?.hp_max || "";
    $("det_atual").value = p.saude?.det_atual || "";
    $("det_max").value = p.saude?.det_max || "";
    $("assim_atual").value = p.saude?.assim_atual || "";
    $("assim_max").value = p.saude?.assim_max || "";

    $("habilidades").value = p.habilidades || "";
    $("equipamentos").value = p.equipamentos || "";
  }

  carregando = false;

  autoResize($("habilidades"));
  autoResize($("equipamentos"));
}

/* AUTOSAVE + RESIZE */
document.querySelectorAll("input, textarea").forEach(el => {
    el.addEventListener("input", () => {

        if (el.tagName === "TEXTAREA") autoResize(el);

        clearTimeout(timeout);
        timeout = setTimeout(salvar, 500);
    });
});

/* TABS */
function showTab(id) {
  document.querySelectorAll(".tab").forEach(t => t.style.display = "none");
  document.getElementById(id).style.display = "block";
}
window.showTab = showTab;

/* INIT */
window.onload = () => {
  showTab("basico");
  load();
};
</script>

</body>
</html>
