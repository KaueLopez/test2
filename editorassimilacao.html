<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FICHA ASSIMILAÇÃO CODICE</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #000;
    color: white;
}

h2 {
    text-align: center;
    margin: 10px 0;
}

.tabs {
    display: flex;
    background: #1a1a1a;
}

.tabs button {
    flex: 1;
    padding: 14px;
    border: none;
    background: #1a1a1a;
    color: white;
    cursor: pointer;
}

.tab {
    display: none;
    padding: 12px;
}

.block {
    background: #0b0b0b;
    border: 1px solid #333;
    border-radius: 10px;
    padding: 15px;
    margin-bottom: 12px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 6px;
    border: none;
    background: #fff;
    color: #000;
}

/* AUTO RESIZE */
textarea {
    min-height: 120px;
    resize: none;
    overflow: hidden;
}

h3 {
    background: #2a2a2a;
    padding: 8px;
    border-radius: 6px;
}

/* GRID */
.grid2x3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.cell {
    text-align: center;
}

.label {
    font-size: 12px;
}
</style>
</head>

<body>

<h2>FICHA ASSIMILAÇÃO CODICE</h2>

<div class="tabs">
    <button onclick="showTab('basico')">Básico</button>
    <button onclick="showTab('combate')">Combate</button>
    <button onclick="showTab('extras')">Extras</button>
</div>

<!-- BASICO -->
<div id="basico" class="tab">
<div class="block">
<input id="nome" placeholder="Nome">
<textarea id="evento" placeholder="Evento Marcante"></textarea>
<input id="social" placeholder="Posição Social">
</div>
</div>

<!-- COMBATE -->
<div id="combate" class="tab">
<div class="block">

<h3>HP</h3>
    <div class="grid">
    <input id="hp_1" type="number">
    <input id="hp_2" type="number">
    <input id="hp_3" type="number">
    <input id="hp_3" type="number">
    <input id="hp_4" type="number">


<h3>Instintos</h3>
    <div class="grid">
    <div><input id="reacao" type="number"><div class="label">reacao</div></div>
    <div><input id="percepcao" type="number"><div class="label">percepcao</div></div>
    <div><input id="sagacidade" type="number"><div class="label">sagacidade</div></div>


<h3>Conhecimentos</h3>
    <div class="grid">
    <div><input id="agrario" type="number"><div class="label">agrario</div></div>
    <div><input id="biologico" type="number"><div class="label">biologico</div></div>
    <div><input id="exato" type="number"><div class="label">exato</div></div>

<h3>Práticas</h3>
    <div class="grid">
    <div><input id="esportivas" type="number"><div class="label">esportivas</div></div>
    <div><input id="ferramentaso" type="number"><div class="label">ferramentas</div></div>
    <div><input id="oficios" type="number"><div class="label">oficios</div></div>

</div>
</div>

<!-- EXTRAS -->
<div id="extras" class="tab">
<div class="block">

<h3>Habilidades</h3>
<textarea id="habilidades"></textarea>

<h3>Equipamentos</h3>
<textarea id="equipamentos"></textarea>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSyBp6FWCK0IYmeAbCMjdyStz5z1xeUvieV4",
  authDomain: "fichasrpg-45934.firebaseapp.com",
  databaseURL: "https://fichasrpg-45934-default-rtdb.firebaseio.com"
});

const db = getDatabase(app);
const id = new URLSearchParams(location.search).get("id") || "default";

const $ = (i)=>document.getElementById(i);

let carregando = true;
let timeout;

/* AUTO RESIZE */
function autoResize(el){
    el.style.height = "auto";
    el.style.height = el.scrollHeight + "px";
}

/* SAVE (SALVA TUDO) */
function salvar(){
if(carregando) return;

set(ref(db,"personagens/"+id),{

nome:$("nome").value||"",
evento:$("evento").value||"",
social:$("social").value||"",

hp_atual:+$("hp_atual").value||0,
hp_max:+$("hp_max").value||0,

reacao:$("reacao").value||"",
percepcao:$("percepcao").value||"",
sagacidade:$("sagacidade").value||"",

agrario:$("agrario").value||"",
biologico:$("biologico").value||"",
exato:$("exato").value||"",

esportivas:$("esportivas").value||"",
ferramentas:$("ferramentas").value||"",
oficios:$("oficios").value||"",

habilidades:$("habilidades").value||"",
equipamentos:$("equipamentos").value||""

});
}

/* LOAD */
async function load(){
const snap=await get(child(ref(db),"personagens/"+id));
if(!snap.exists()){carregando=false;return}

const p=snap.val();

/* carrega dinamico */
Object.keys(p).forEach(k=>{
if($(k)) $(k).value=p[k];
});

carregando=false;

/* resize após load */
["evento","habilidades","equipamentos"].forEach(id=>{
autoResize($(id));
});
}

/* EVENTOS */
document.querySelectorAll("input,textarea").forEach(el=>{
el.addEventListener("input",()=>{
if(el.tagName==="TEXTAREA") autoResize(el);

clearTimeout(timeout);
timeout=setTimeout(salvar,500);
});
});

/* TABS */
function showTab(id){
document.querySelectorAll(".tab").forEach(t=>t.style.display="none");
$(id).style.display="block";
}
window.showTab=showTab;

/* INIT */
window.onload=()=>{
showTab("basico");
load();
};
</script>

</body>
</html>
