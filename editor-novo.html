<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBp6FWCK0IYmeAbCMjdyStz5z1xeUvieV4",
  authDomain: "fichasrpg-45934.firebaseapp.com",
  databaseURL: "https://fichasrpg-45934-default-rtdb.firebaseio.com",
  projectId: "fichasrpg-45934",
  storageBucket: "fichasrpg-45934.firebasestorage.app",
  messagingSenderId: "523682127281",
  measurementId: "G-L22V165GJX"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const $ = (id) => document.getElementById(id);

let id = new URLSearchParams(window.location.search).get("id");
let tipo = null;
let carregando = true;
let timeout;

/* ================= CARREGAR ================= */
function carregar() {
    if (!id) return;

    get(child(ref(db), "personagens/" + id)).then(snap => {
        if (!snap.exists()) return;

        const p = snap.val();
        tipo = p.tipo || "assimilar";

        if (tipo === "assimilar") {
            $("assimilar").style.display = "block";
            $("ordem").style.display = "none";

            $("nome").value = p.nome || "";
            $("evento").value = p.evento || "";
            $("social").value = p.social || "";

            $("hp_atual").value = p.saude?.hp_atual || 0;
            $("hp_max").value = p.saude?.hp_max || 0;

            const i = p.instintos || {};
            $("reacao").value = i.reacao || 0;
            $("percepcao").value = i.percepcao || 0;
            $("sagacidade").value = i.sagacidade || 0;
            $("potencia").value = i.potencia || 0;
            $("influencia").value = i.influencia || 0;
            $("resolucao").value = i.resolucao || 0;

            const c = p.conhecimentos || {};
            $("agrario").value = c.agrario || 0;
            $("biologico").value = c.biologico || 0;
            $("exato").value = c.exato || 0;
            $("medicina").value = c.medicina || 0;
            $("social2").value = c.social || 0;
            $("artistico").value = c.artistico || 0;

            const pr = p.praticas || {};
            $("esportivas").value = pr.esportivas || 0;
            $("ferramentas").value = pr.ferramentas || 0;
            $("oficios").value = pr.oficios || 0;
            $("armas").value = pr.armas || 0;
            $("veiculos").value = pr.veiculos || 0;
            $("infiltracao").value = pr.infiltracao || 0;

            $("caracteristicas").value = p.caracteristicas || "";
            $("equipamentos").value = p.equipamentos || "";
        }

        if (tipo === "ordem") {
            $("assimilar").style.display = "none";
            $("ordem").style.display = "block";

            const d = p.dados || {};
            const i = d.info || {};
            const a = d.atributos || {};

            $("o_nome").value = i.nome || "";
            $("o_origem").value = i.origem || "";
            $("o_classe").value = i.classe || "";

            $("agi").value = a.agi || 0;
            $("for").value = a.for || 0;
            $("int").value = a.int || 0;
            $("vig").value = a.vig || 0;
            $("pre").value = a.pre || 0;
            $("nivel").value = a.nivel || 0;
            $("nex").value = a.nex || 0;
        }

        carregando = false;
    });
}

/* ================= SALVAR ================= */
function salvar() {
    if (!id || carregando) return;

    let data;

    if (tipo === "assimilar") {
        data = {
            tipo: "assimilar",
            nome: $("nome").value,
            evento: $("evento").value,
            social: $("social").value,

            saude: {
                hp_atual: +$("hp_atual").value || 0,
                hp_max: +$("hp_max").value || 0
            },

            instintos: {
                reacao: +$("reacao").value || 0,
                percepcao: +$("percepcao").value || 0,
                sagacidade: +$("sagacidade").value || 0,
                potencia: +$("potencia").value || 0,
                influencia: +$("influencia").value || 0,
                resolucao: +$("resolucao").value || 0
            },

            conhecimentos: {
                agrario: +$("agrario").value || 0,
                biologico: +$("biologico").value || 0,
                exato: +$("exato").value || 0,
                medicina: +$("medicina").value || 0,
                social: +$("social2").value || 0,
                artistico: +$("artistico").value || 0
            },

            praticas: {
                esportivas: +$("esportivas").value || 0,
                ferramentas: +$("ferramentas").value || 0,
                oficios: +$("oficios").value || 0,
                armas: +$("armas").value || 0,
                veiculos: +$("veiculos").value || 0,
                infiltracao: +$("infiltracao").value || 0
            },

            caracteristicas: $("caracteristicas").value,
            equipamentos: $("equipamentos").value
        };
    }

    if (tipo === "ordem") {
        data = {
            tipo: "ordem",
            dados: {
                info: {
                    nome: $("o_nome").value,
                    origem: $("o_origem").value,
                    classe: $("o_classe").value
                },
                atributos: {
                    agi: +$("agi").value || 0,
                    for: +$("for").value || 0,
                    int: +$("int").value || 0,
                    vig: +$("vig").value || 0,
                    pre: +$("pre").value || 0,
                    nivel: +$("nivel").value || 0,
                    nex: +$("nex").value || 0
                }
            }
        };
    }

    set(ref(db, "personagens/" + id), data);
}

/* ================= AUTOSAVE ================= */
document.querySelectorAll("input, textarea").forEach(el => {
    el.addEventListener("input", () => {
        if (carregando) return;
        clearTimeout(timeout);
        timeout = setTimeout(salvar, 400);
    });
});

window.onload = carregar;
</script>
