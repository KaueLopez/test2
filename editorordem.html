<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FICHA ORDEM CODICE</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

header {
    text-align: center;
    padding: 10px;
    background: #1a1a1a;
    position: sticky;
    top: 0;
}

.tabs {
    display: flex;
    position: sticky;
    top: 44px;
    background: #1f1f1f;
}

.tabs button {
    flex: 1;
    padding: 14px;
    border: none;
    background: #1f1f1f;
    color: white;
    cursor: pointer;
}

.tab {
    display: none;
    padding: 12px;
}

input, textarea {
    width: 100%;
    padding: 12px;
    font-size: 15px;
    border-radius: 8px;
    border: none;
    margin-bottom: 10px;
    box-sizing: border-box;
}

.grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr); /* 🔥 agora suporta mais campos */
    gap: 10px;
}

@media (max-width: 800px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 500px) {
    .grid { grid-template-columns: 1fr; }
}

.block {
    background: #161616;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #2a2a2a;
    margin-bottom: 12px;
}

.label {
    font-size: 12px;
    opacity: 0.7;
    text-align: center;
}

.cell {
    text-align: center;
}
</style>
</head>

<body>

<header>FICHA ORDEM CODICE</header>

<div class="tabs">
    <button onclick="showTab('info')">Info</button>
    <button onclick="showTab('combat')">Combate</button>
    <button onclick="showTab('skills')">Skills</button>
</div>

<!-- INFO -->
<div id="info" class="tab">
    <div class="block">
        <input id="nome" placeholder="Nome">
        <input id="classe" placeholder="Classe">
        <input id="origem" placeholder="Origem">
        <textarea id="descricao" placeholder="Descrição"></textarea>
    </div>
</div>

<!-- COMBATE -->
<div id="combat" class="tab">

<div class="block">
<h3>HP</h3>
<div class="grid">
    <div class="cell"><input id="hp_atual" type="number"><div class="label">Atual</div></div>
    <div class="cell"><input id="hp_max" type="number"><div class="label">Máx</div></div>
</div>
</div>

<div class="block">
<h3>Sanidade</h3>
<div class="grid">
    <div class="cell"><input id="san_atual" type="number"><div class="label">Atual</div></div>
    <div class="cell"><input id="san_max" type="number"><div class="label">Máx</div></div>
</div>
</div>

<div class="block">
<h3>PD / PE</h3>

<div class="grid">
    <div class="cell"><input id="pe_atual" type="number"><div class="label">PE Atual</div></div>
    <div class="cell"><input id="pe_max" type="number"><div class="label">PE Máx</div></div>
    <div class="cell"><input id="pe_turno" type="number"><div class="label">PE / Turno</div></div>

    <div class="cell"><input id="pd_atual" type="number"><div class="label">PD Atual</div></div>
    <div class="cell"><input id="pd_max" type="number"><div class="label">PD Máx</div></div>
    <div class="cell"><input id="pd_turno" type="number"><div class="label">PD / Turno</div></div>
</div>

</div>

<div class="block">
<h3>Defesa</h3>
<div class="grid">
    <div class="cell"><input id="defesa" type="number"><div class="label">Defesa</div></div>
    <div class="cell"><input id="bloqueio" type="number"><div class="label">Bloqueio</div></div>
    <div class="cell"><input id="esquiva" type="number"><div class="label">Esquiva</div></div>
</div>
</div>

<div class="block">
<h3>Armas</h3>
<input id="arma1">
<input id="arma2">
<input id="arma3">
</div>

</div>

<!-- SKILLS -->
<div id="skills" class="tab">
<div class="block">
<h3>Atributos</h3>
<div class="grid">
    <div class="cell"><input id="for" type="number"><div class="label">FOR</div></div>
    <div class="cell"><input id="agi" type="number"><div class="label">AGI</div></div>
    <div class="cell"><input id="int" type="number"><div class="label">INT</div></div>
    <div class="cell"><input id="vig" type="number"><div class="label">VIG</div></div>
    <div class="cell"><input id="pre" type="number"><div class="label">PRE</div></div>
    <div class="cell"><input id="desl" type="number"><div class="label">DESL</div></div>
</div>
</div>
</div>

<script>
function showTab(tabId) {
    document.querySelectorAll(".tab").forEach(tab => tab.style.display = "none");
    document.getElementById(tabId).style.display = "block";
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({
  apiKey: "SUA_KEY",
  authDomain: "SEU_AUTH",
  databaseURL: "SEU_DB_URL"
});

const db = getDatabase(app);
const id = new URLSearchParams(location.search).get("id");

if(!id){
    alert("ID não fornecido na URL");
}

const $ = id => document.getElementById(id);

let carregando = true;
let userEditing = false;

document.querySelectorAll("input, textarea").forEach(el=>{
    el.addEventListener("focus", ()=> userEditing = true);
    el.addEventListener("blur", ()=> userEditing = false);
});

/* 🔥 SYNC */
onValue(ref(db,"personagens/"+id), snap=>{
    if(!snap.exists() || userEditing) return;

    const p = snap.val();
    const i = p.dados?.info || {};
    const c = p.dados?.combate || {};

    $("nome").value = i.nome || "";
    $("classe").value = i.classe || "";
    $("origem").value = i.origem || "";

    $("hp_atual").value = c.hp_atual || 0;
    $("hp_max").value = c.hp_max || 0;

    $("san_atual").value = c.sanidade_atual || 0;
    $("san_max").value = c.sanidade_max || 0;

    $("pe_atual").value = c.pe_atual || 0;
    $("pe_max").value = c.pe_max || 0;
    $("pe_turno").value = c.pe_turno || 0;

    $("pd_atual").value = c.pd_atual || 0;
    $("pd_max").value = c.pd_max || 0;
    $("pd_turno").value = c.pd_turno || 0;

    carregando = false;
});

/* 🔥 AUTOSAVE */
function bind(idField, key){
    $(idField).addEventListener("input", async ()=>{
        if(carregando) return;

        const value = $(idField).value;
        const parsed = value === "" ? null : Number(value);

        await update(ref(db,"personagens/"+id+"/dados/combate"), {
            [key]: parsed
        });
    });
}

/* BINDS */
["hp_atual","hp_max","san_atual","san_max",
 "pe_atual","pe_max","pe_turno",
 "pd_atual","pd_max","pd_turno"].forEach(id=>{
    bind(id,id);
});

bind("nome","nome");
bind("classe","classe");
bind("origem","origem");

window.onload = ()=> showTab("info");
</script>

</body>
</html>
