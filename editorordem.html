<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Editor RPG Mobile</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

/* HEADER */
header {
    text-align: center;
    padding: 10px;
    font-size: 18px;
    background: #1a1a1a;
    position: sticky;
    top: 0;
}

/* TABS MOBILE STYLE */
.tabs {
    display: flex;
    position: sticky;
    top: 44px;
    background: #1f1f1f;
    z-index: 10;
}

.tabs button {
    flex: 1;
    padding: 14px;
    border: none;
    background: #1f1f1f;
    color: white;
    font-size: 14px;
}

.tabs button:hover {
    background: #2a2a2a;
}

/* PAGES */
.tab {
    display: none;
    padding: 12px;
}

/* INPUTS */
input, textarea {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    margin-bottom: 12px;
    box-sizing: border-box;
    background: #fff;
    color: #000;
}

textarea {
    min-height: 90px;
}

/* GRID RESPONSIVO REAL */
.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

@media (max-width: 900px) {
    .grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (max-width: 600px) {
    .grid {
        grid-template-columns: 1fr;
    }
}

/* CELULA */
.cell {
    text-align: center;
}

.label {
    font-size: 12px;
    opacity: 0.7;
    margin-top: 4px;
}

/* BOTÃO SALVAR FLUTUANTE */
.save-indicator {
    position: fixed;
    bottom: 15px;
    right: 15px;
    background: #7c3aed;
    padding: 10px 14px;
    border-radius: 20px;
    font-size: 12px;
    z-index: 100;
}
</style>
</head>

<body>

<header>Editor RPG Mobile</header>

<div class="tabs">
    <button onclick="showTab('info')">Info</button>
    <button onclick="showTab('combate')">Combate</button>
    <button onclick="showTab('skills')">Skills</button>
</div>

<!-- INFO -->
<div id="info" class="tab">

<input id="nome" placeholder="Nome">
<input id="classe" placeholder="Classe">
<input id="origem" placeholder="Origem">

<textarea id="descricao" placeholder="Descrição"></textarea>

</div>

<!-- COMBATE -->
<div id="combate" class="tab">

<h3>HP</h3>
<div class="grid">
    <div class="cell">
        <input id="hp_atual" type="number">
        <div class="label">HP Atual</div>
    </div>
    <div class="cell">
        <input id="hp_max" type="number">
        <div class="label">HP Máx</div>
    </div>
</div>

<h3>Sanidade</h3>
<div class="grid">
    <div class="cell">
        <input id="san_atual" type="number">
        <div class="label">Atual</div>
    </div>
    <div class="cell">
        <input id="san_max" type="number">
        <div class="label">Máx</div>
    </div>
</div>

<h3>PD / PE</h3>
<div class="grid">
    <div class="cell">
        <input id="pe_atual" type="number">
        <div class="label">Atual</div>
    </div>
    <div class="cell">
        <input id="pe_max" type="number">
        <div class="label">Máx</div>
    </div>
    <div class="cell">
        <input id="pd_turno" type="number">
        <div class="label">Por Turno</div>
    </div>
</div>

<h3>Defesa</h3>
<div class="grid">
    <div class="cell"><input id="defesa" type="number"><div class="label">Defesa</div></div>
    <div class="cell"><input id="esquiva" type="number"><div class="label">Esquiva</div></div>
    <div class="cell"><input id="bloqueio" type="number"><div class="label">Bloqueio</div></div>
</div>

<h3>Armas</h3>
<input id="arma1" placeholder="Arma 1">
<input id="arma2" placeholder="Arma 2">
<input id="arma3" placeholder="Arma 3">

</div>

<!-- SKILLS -->
<div id="skills" class="tab">

<h3>Atributos</h3>
<div class="grid">
    <div class="cell"><input id="for" type="number"><div class="label">FOR</div></div>
    <div class="cell"><input id="agi" type="number"><div class="label">AGI</div></div>
    <div class="cell"><input id="int" type="number"><div class="label">INT</div></div>
    <div class="cell"><input id="vig" type="number"><div class="label">VIG</div></div>
    <div class="cell"><input id="pre" type="number"><div class="label">PRE</div></div>
    <div class="cell"><input id="desl" type="number"><div class="label">DESL</div></div>
</div>

<h3>Perícias</h3>
<textarea id="pericias"></textarea>

<h3>Habilidades</h3>
<textarea id="habilidades"></textarea>

<h3>Rituais</h3>
<textarea id="rituais"></textarea>

<h3>Equipamentos</h3>
<textarea id="equipamentos"></textarea>

</div>

<div class="save-indicator" id="status">Salvando...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB"
});

const db = getDatabase(app);

const id = new URLSearchParams(location.search).get("id") || crypto.randomUUID();
history.replaceState({}, "", "?id=" + id);

let carregando = true;

function v(id) {
    return document.getElementById(id);
}

/* LOAD */
async function load() {
    const snap = await get(child(ref(db), "chars/" + id));
    if (!snap.exists()) { carregando = false; return; }

    const d = snap.val();

    Object.keys(d).forEach(k => {
        if (v(k)) v(k).value = d[k];
    });

    carregando = false;
}

/* SAVE */
async function save() {
    if (carregando) return;

    let data = {};
    document.querySelectorAll("input, textarea").forEach(el => {
        data[el.id] = el.value;
    });

    await set(ref(db, "chars/" + id), data);

    v("status").innerText = "Salvo ✔";
    setTimeout(() => v("status").innerText = "Salvando...", 1000);
}

/* AUTOSAVE */
let timeout;
document.querySelectorAll("input, textarea").forEach(el => {
    el.addEventListener("input", () => {
        clearTimeout(timeout);
        timeout = setTimeout(save, 600);
    });
});

/* TABS */
function showTab(idTab) {
    document.querySelectorAll(".tab").forEach(t => t.style.display = "none");
    v(idTab).style.display = "block";
}

window.showTab = showTab;

window.onload = () => {
    showTab("info");
    load();
};
</script>

</body>
</html>
