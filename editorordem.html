<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor Mobile</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

header {
    text-align: center;
    padding: 10px;
    background: #1a1a1a;
    position: sticky;
    top: 0;
}

.tabs {
    display: flex;
    position: sticky;
    top: 44px;
    background: #1f1f1f;
}

.tabs button {
    flex: 1;
    padding: 14px;
    border: none;
    background: #1f1f1f;
    color: white;
}

.tab {
    display: none;
    padding: 12px;
}

input, textarea {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    margin-bottom: 12px;
    box-sizing: border-box;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

@media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
}

#status {
    position: fixed;
    bottom: 12px;
    right: 12px;
    background: #7c3aed;
    padding: 8px 12px;
    border-radius: 20px;
}
</style>
</head>

<body>

<header>Editor Mobile</header>

<div class="tabs">
    <button onclick="showTab('info')">Info</button>
    <button onclick="showTab('combat')">Combate</button>
    <button onclick="showTab('skills')">Skills</button>
</div>

<div id="info" class="tab">
    <input id="nome" placeholder="Nome">
    <input id="classe" placeholder="Classe">
    <input id="origem" placeholder="Origem">
    <textarea id="descricao"></textarea>
</div>

<div id="combat" class="tab">
    <input id="hp_atual" placeholder="HP Atual">
    <input id="hp_max" placeholder="HP Max">

    <input id="san_atual" placeholder="San Atual">
    <input id="san_max" placeholder="San Max">

    <input id="pe_atual" placeholder="PE Atual">
    <input id="pe_max" placeholder="PE Max">
    <input id="pd_turno" placeholder="PD Turno">

    <input id="defesa" placeholder="Defesa">
    <input id="bloqueio" placeholder="Bloqueio">
    <input id="esquiva" placeholder="Esquiva">

    <input id="arma1" placeholder="Arma 1">
    <input id="arma2" placeholder="Arma 2">
    <input id="arma3" placeholder="Arma 3">
</div>

<div id="skills" class="tab">
    <input id="for" placeholder="FOR">
    <input id="agi" placeholder="AGI">
    <input id="int" placeholder="INT">
    <input id="vig" placeholder="VIG">
    <input id="pre" placeholder="PRE">
    <input id="desl" placeholder="DESL">

    <textarea id="pericias"></textarea>
    <textarea id="habilidades"></textarea>
    <textarea id="rituais"></textarea>
    <textarea id="equipamentos"></textarea>

    <label>
        <input id="modoPD" type="checkbox"> Modo PD
    </label>
</div>

<div id="status">Salvando...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSyBp6FWCK0IYmeAbCMjdyStz5z1xeUvieV4",
  authDomain: "fichasrpg-45934.firebaseapp.com",
  databaseURL: "https://fichasrpg-45934-default-rtdb.firebaseio.com"
});

const db = getDatabase(app);
const id = new URLSearchParams(location.search).get("id");

const $ = (id) => document.getElementById(id);

function showTab(t){
    document.querySelectorAll(".tab").forEach(e=>e.style.display="none");
    $(t).style.display="block";
}

window.showTab = showTab;

let carregando = true;

async function load(){
    const snap = await get(child(ref(db), "personagens/" + id));
    if(!snap.exists()){carregando=false;return;}

    const p = snap.val();
    const i = p.dados?.info || {};
    const c = p.dados?.combate || {};
    const a = p.dados?.atributos || {};
    const e = p.extras || {};
    const cfg = p.config || {};

    $("nome").value=i.nome||"";
    $("classe").value=i.classe||"";
    $("origem").value=i.origem||"";
    $("descricao").value=e.descricao||"";

    $("hp_atual").value=c.hp_atual||0;
    $("hp_max").value=c.hp_max||0;

    $("san_atual").value=c.sanidade_atual||0;
    $("san_max").value=c.sanidade_max||0;

    $("pe_atual").value=c.pe_atual||0;
    $("pe_max").value=c.pe_max||0;
    $("pd_turno").value=c.pd_turno||0;

    $("defesa").value=c.defesa||0;
    $("bloqueio").value=c.bloqueio||0;
    $("esquiva").value=c.esquiva||0;

    $("arma1").value=c.arma1||"";
    $("arma2").value=c.arma2||"";
    $("arma3").value=c.arma3||"";

    $("for").value=a.for||0;
    $("agi").value=a.agi||0;
    $("int").value=a.int||0;
    $("vig").value=a.vig||0;
    $("pre").value=a.pre||0;
    $("desl").value=a.deslocamento||0;

    $("pericias").value=e.pericias||"";
    $("habilidades").value=e.habilidades||"";
    $("rituais").value=e.rituais||"";
    $("equipamentos").value=e.equipamentos||"";

    $("modoPD").checked=cfg.modoPD||false;

    carregando=false;
}

async function save(){
    if(carregando) return;

    await set(ref(db,"personagens/"+id),{
        dados:{
            info:{
                nome:$("nome").value,
                classe:$("classe").value,
                origem:$("origem").value
            },
            atributos:{
                for:+$("for").value||0,
                agi:+$("agi").value||0,
                int:+$("int").value||0,
                vig:+$("vig").value||0,
                pre:+$("pre").value||0,
                deslocamento:+$("desl").value||0
            },
            combate:{
                hp_atual:+$("hp_atual").value||0,
                hp_max:+$("hp_max").value||0,
                sanidade_atual:+$("san_atual").value||0,
                sanidade_max:+$("san_max").value||0,
                pe_atual:+$("pe_atual").value||0,
                pe_max:+$("pe_max").value||0,
                pd_turno:+$("pd_turno").value||0,
                defesa:+$("defesa").value||0,
                bloqueio:+$("bloqueio").value||0,
                esquiva:+$("esquiva").value||0,
                arma1:$("arma1").value,
                arma2:$("arma2").value,
                arma3:$("arma3").value
            }
        },
        extras:{
            pericias:$("pericias").value,
            habilidades:$("habilidades").value,
            rituais:$("rituais").value,
            equipamentos:$("equipamentos").value,
            descricao:$("descricao").value
        },
        config:{
            modoPD:$("modoPD").checked
        }
    });
}

setInterval(save,5000);
window.onload=()=>{showTab("info");load();}
</script>

</body>
</html>
