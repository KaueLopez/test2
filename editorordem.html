<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RPG Panel</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

header {
    text-align: center;
    padding: 10px;
    background: #1a1a1a;
    position: sticky;
    top: 0;
}

.tabs {
    display: flex;
    position: sticky;
    top: 44px;
    background: #1f1f1f;
}

.tabs button {
    flex: 1;
    padding: 14px;
    border: none;
    background: #1f1f1f;
    color: white;
}

.tab {
    display: none;
    padding: 12px;
}

input, textarea {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    margin-bottom: 12px;
    box-sizing: border-box;
}

textarea {
    min-height: 90px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

@media (max-width: 800px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 500px) {
    .grid { grid-template-columns: 1fr; }
}

.cell {
    text-align: center;
}

.label {
    font-size: 12px;
    opacity: 0.7;
    margin-top: 4px;
}

#status {
    position: fixed;
    bottom: 12px;
    right: 12px;
    background: #7c3aed;
    padding: 8px 12px;
    border-radius: 20px;
    font-size: 12px;
}
</style>
</head>

<body>

<header>RPG Character Panel</header>

<div class="tabs">
    <button onclick="showTab('info')">Info</button>
    <button onclick="showTab('combat')">Combate</button>
    <button onclick="showTab('skills')">Skills</button>
</div>

<!-- INFO -->
<div id="info" class="tab">
    <input id="nome" placeholder="Nome">
    <input id="classe" placeholder="Classe">
    <input id="origem" placeholder="Origem">
    <textarea id="descricao" placeholder="Descrição"></textarea>
</div>

<!-- COMBATE -->
<div id="combat" class="tab">

<h3>HP</h3>
<div class="grid">
    <div class="cell">
        <input id="hp_atual" type="number">
        <div class="label">HP Atual</div>
    </div>
    <div class="cell">
        <input id="hp_max" type="number">
        <div class="label">HP Máx</div>
    </div>
</div>

<h3>Sanidade</h3>
<div class="grid">
    <div class="cell">
        <input id="san_atual" type="number">
        <div class="label">Atual</div>
    </div>
    <div class="cell">
        <input id="san_max" type="number">
        <div class="label">Máx</div>
    </div>
</div>

<h3>PD / PE</h3>
<div class="grid">
    <div class="cell">
        <input id="pe_atual" type="number">
        <div class="label">Atual</div>
    </div>
    <div class="cell">
        <input id="pe_max" type="number">
        <div class="label">Máx</div>
    </div>
    <div class="cell">
        <input id="pd_turno" type="number">
        <div class="label">Por Turno</div>
    </div>
</div>

<h3>Defesa</h3>
<div class="grid">
    <div class="cell"><input id="defesa" type="number"><div class="label">Defesa</div></div>
    <div class="cell"><input id="bloqueio" type="number"><div class="label">Bloqueio</div></div>
    <div class="cell"><input id="esquiva" type="number"><div class="label">Esquiva</div></div>
</div>

<h3>Armas</h3>
<input id="arma1" placeholder="Arma 1">
<input id="arma2" placeholder="Arma 2">
<input id="arma3" placeholder="Arma 3">

</div>

<!-- SKILLS -->
<div id="skills" class="tab">

<h3>Atributos</h3>
<div class="grid">
    <div class="cell"><input id="for" type="number"><div class="label">FOR</div></div>
    <div class="cell"><input id="agi" type="number"><div class="label">AGI</div></div>
    <div class="cell"><input id="int" type="number"><div class="label">INT</div></div>
    <div class="cell"><input id="vig" type="number"><div class="label">VIG</div></div>
    <div class="cell"><input id="pre" type="number"><div class="label">PRE</div></div>
    <div class="cell"><input id="desl" type="number"><div class="label">DESL</div></div>
</div>

<h3>Perícias</h3>
<textarea id="pericias"></textarea>

<h3>Habilidades</h3>
<textarea id="habilidades"></textarea>

<h3>Rituais</h3>
<textarea id="rituais"></textarea>

<h3>Equipamentos</h3>
<textarea id="equipamentos"></textarea>

</div>

<div id="status">Salvando...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, child, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSyBp6FWCK0IYmeAbCMjdyStz5z1xeUvieV4",
  authDomain: "fichasrpg-45934.firebaseapp.com",
  databaseURL: "https://fichasrpg-45934-default-rtdb.firebaseio.com"
});

const db = getDatabase(app);

const id = new URLSearchParams(location.search).get("id") || crypto.randomUUID();
history.replaceState({}, "", "?id=" + id);

let carregando = true;

/* HELP */
const $ = (id) => document.getElementById(id);

/* 🔥 LOAD SEGURO (não quebra com outros editores) */
async function load() {
    try {
        const snap = await get(child(ref(db), "personagens/" + id));

        if (!snap.exists()) {
            carregando = false;
            return;
        }

        const d = snap.val();

        // flat safe loader (ignora campos inexistentes)
        for (const key in d) {
            const el = $(key);
            if (el) el.value = d[key];
        }

        carregando = false;

    } catch (e) {
        console.error("LOAD ERROR:", e);
        carregando = false;
    }
}

/* 🔥 SAVE INTELIGENTE (não destrói dados do outro editor) */
async function save() {
    if (carregando) return;

    let patch = {};

    document.querySelectorAll("input, textarea").forEach(el => {
        if (el.id) patch[el.id] = el.value;
    });

    // UPDATE ao invés de SET (isso resolve o conflito com PC editor)
    await update(ref(db, "personagens/" + id), patch);

    $("status").innerText = "Salvo ✔";
    setTimeout(() => $("status").innerText = "Salvando...", 1000);
}

/* AUTOSAVE */
let timeout;
document.querySelectorAll("input, textarea").forEach(el => {
    el.addEventListener("input", () => {
        if (carregando) return;

        clearTimeout(timeout);
        timeout = setTimeout(save, 600);
    });
});

/* TABS FIX */
function showTab(tabId) {
    document.querySelectorAll(".tab").forEach(t => {
        t.classList.remove("active");
    });

    const el = document.getElementById(tabId);
    if (el) el.classList.add("active");
}

window.showTab = showTab;

/* INIT */
window.onload = async () => {
    showTab("info");
    await load();
};
</script>

</body>
</html>
