<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FICHA ORDEM CODICE</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
}

h2 {
    text-align: center;
    margin: 10px 0;
}

/* TABS */
.tabs {
    display: flex;
    background: #222;
}

.tabs button {
    flex: 1;
    padding: 14px;
    border: none;
    background: #222;
    color: white;
}

/* CONTEÚDO */
.tab {
    display: none;
    padding: 12px;
}

/* INPUTS */
input, textarea {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border-radius: 6px;
    border: none;
    margin-bottom: 12px;
    box-sizing: border-box;
    text-align: center;
}

textarea {
    min-height: 80px;
    resize: none;
    text-align: left;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 15px;
}

.grid3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.cell {
    text-align: center;
}

.label {
    font-size: 12px;
    opacity: 0.7;
}

.block {
    background: #1a1a1a;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<h2>FICHA ORDEM CODICE</h2>

<div class="tabs">
    <button onclick="showTab('info')">Info</button>
    <button onclick="showTab('combat')">Combate</button>
    <button onclick="showTab('extras')">Extras</button>
</div>

<!-- INFO -->
<div id="info" class="tab">
    <input id="nome" placeholder="Nome">
    <input id="classe" placeholder="Classe">
    <input id="origem" placeholder="Origem">
    <textarea id="descricao" placeholder="Descrição"></textarea>
</div>

<!-- COMBATE -->
<div id="combat" class="tab">

<div class="block">
<h3>HP</h3>
<div class="grid">
    <div class="cell">
        <input id="hp_atual" type="number">
        <div class="label">Atual</div>
    </div>
    <div class="cell">
        <input id="hp_max" type="number">
        <div class="label">Máx</div>
    </div>
</div>
</div>

<div class="block">
<h3>Sanidade</h3>
<div class="grid">
    <div class="cell">
        <input id="san_atual" type="number">
        <div class="label">Atual</div>
    </div>
    <div class="cell">
        <input id="san_max" type="number">
        <div class="label">Máx</div>
    </div>
</div>
</div>

<div class="block">
<h3>PE / PD</h3>

<div class="grid">
    <div class="cell">
        <input id="pe_atual" type="number">
        <div class="label">PE Atual</div>
    </div>
    <div class="cell">
        <input id="pe_max" type="number">
        <div class="label">PE Máx</div>
    </div>
</div>

<div class="grid">
    <div class="cell">
        <input id="pe_turno" type="number">
        <div class="label">PE/Turno</div>
    </div>
</div>

<div class="grid">
    <div class="cell">
        <input id="pd_atual" type="number">
        <div class="label">PD Atual</div>
    </div>
    <div class="cell">
        <input id="pd_max" type="number">
        <div class="label">PD Máx</div>
    </div>
</div>

<div class="grid">
    <div class="cell">
        <input id="pd_turno" type="number">
        <div class="label">PD/Turno</div>
    </div>
</div>
</div>

<!-- 🔥 Atributos AGORA AQUI -->
<div class="block">
<h3>Atributos</h3>
<div class="grid3">
    <div class="cell"><input id="for" type="number"><div class="label">FOR</div></div>
    <div class="cell"><input id="agi" type="number"><div class="label">AGI</div></div>
    <div class="cell"><input id="int" type="number"><div class="label">INT</div></div>
    <div class="cell"><input id="vig" type="number"><div class="label">VIG</div></div>
    <div class="cell"><input id="pre" type="number"><div class="label">PRE</div></div>
    <div class="cell"><input id="desl" type="number"><div class="label">DESL</div></div>
</div>
</div>

<!-- 🔥 Armas AGORA AQUI -->
<div class="block">
<h3>Armas</h3>
<input id="arma1" placeholder="Arma 1">
<input id="arma2" placeholder="Arma 2">
<input id="arma3" placeholder="Arma 3">
</div>

</div>

<!-- EXTRAS -->
<div id="extras" class="tab">
    <textarea id="pericias" placeholder="Perícias"></textarea>
    <textarea id="habilidades" placeholder="Habilidades"></textarea>
    <textarea id="rituais" placeholder="Rituais"></textarea>
    <textarea id="equipamentos" placeholder="Equipamentos"></textarea>
</div>

<!-- TAB SCRIPT -->
<script>
window.showTab = function(id) {
    document.querySelectorAll(".tab").forEach(t => t.style.display = "none");
    document.getElementById(id).style.display = "block";
};
window.onload = ()=> showTab("info");
</script>

</body>
</html>
