<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FICHA ORDEM CODICE</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

header {
    text-align: center;
    padding: 10px;
    background: #1a1a1a;
    position: sticky;
    top: 0;
}

.tabs {
    display: flex;
    background: #1f1f1f;
    position: sticky;
    top: 44px;
}

.tabs button {
    flex: 1;
    padding: 14px;
    border: none;
    background: #1f1f1f;
    color: white;
    cursor: pointer;
}

.tab {
    display: none;
    padding: 12px;
}

input, textarea {
    width: 100%;
    padding: 12px;
    font-size: 15px;
    border-radius: 8px;
    border: none;
    margin-bottom: 10px;
    box-sizing: border-box;
}

/* AUTO RESIZE BASE */
textarea {
    min-height: 120px;
    resize: none;
    overflow: hidden;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.label {
    font-size: 12px;
    opacity: 0.7;
    margin-top: 4px;
}

h3 {
    margin-top: 15px;
    background: #1f1f1f;
    padding: 8px;
    border-left: 4px solid #7c3aed;
}
</style>
</head>

<body>

<header>FICHA ORDEM CODICE</header>

<div class="tabs">
    <button onclick="showTab('info')">Info</button>
    <button onclick="showTab('combat')">Combate</button>
    <button onclick="showTab('skills')">Skills</button>
</div>

<!-- INFO -->
<div id="info" class="tab">
    <input id="nome" placeholder="Nome">
    <input id="classe" placeholder="Classe">
    <input id="origem" placeholder="Origem">
    <textarea id="descricao" placeholder="Descrição"></textarea>
</div>

<!-- COMBATE -->
<div id="combat" class="tab">

<h3>Atributos</h3>
<div class="grid">
    <div><input id="for" type="number"><div class="label">FOR</div></div>
    <div><input id="agi" type="number"><div class="label">AGI</div></div>
    <div><input id="int" type="number"><div class="label">INT</div></div>
    <div><input id="vig" type="number"><div class="label">VIG</div></div>
    <div><input id="pre" type="number"><div class="label">PRE</div></div>
    <div><input id="desl" type="number"><div class="label">DESL</div></div>
</div>

<h3>Defesa</h3>
<div class="grid">
    <div><input id="defesa" type="number"><div class="label">DEFESA</div></div>
    <div><input id="bloqueio" type="number"><div class="label">BLOQUEIO</div></div>
    <div><input id="esquiva" type="number"><div class="label">ESQUIVA</div></div>
</div>

<h3>Recursos</h3>
    <div class="grid">
    <div><input id="hp_atual" type="number"><div class="label">hp Atual</div></div>
    <div><input id="hp_max" type="number"><div class="label">hp Máx</div></div>
</div>
<div class="grid">
    <div><input id="san_atual" type="number"><div class="label">SAN Atual</div></div>
    <div><input id="san_max" type="number"><div class="label">SAN Máx</div></div>
</div>

<div class="grid">
    <div><input id="pe_atual" type="number"><div class="label">PE Atual</div></div>
    <div><input id="pe_max" type="number"><div class="label">PE Máx</div></div>
     <div><label>PE/PD Turno</label><input id="pe_turno" type="number"></div>
</div>

<div class="grid">
    <div><input id="pd_atual" type="number"><div class="label">PD Atual</div></div>
    <div><input id="pd_max" type="number"><div class="label">PD Máx</div></div>
</div>

<h3>Armas</h3>
<input id="arma1" placeholder="Arma 1">
<input id="arma2" placeholder="Arma 2">
<input id="arma3" placeholder="Arma 3">

</div>

<!-- SKILLS -->
<div id="skills" class="tab">
    <textarea id="pericias" placeholder="Perícias"></textarea>
    <textarea id="habilidades" placeholder="Habilidades"></textarea>
    <textarea id="rituais" placeholder="Rituais"></textarea>
    <textarea id="equipamentos" placeholder="Equipamentos"></textarea>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({
  apiKey: "SUA_API_KEY",
  authDomain: "fichasrpg-45934.firebaseapp.com",
  databaseURL: "https://fichasrpg-45934-default-rtdb.firebaseio.com"
});

const db = getDatabase(app);
const id = new URLSearchParams(location.search).get("id");

function $(id){ return document.getElementById(id); }

/* TAB */
window.showTab = function(tab){
    document.querySelectorAll(".tab").forEach(t => t.style.display = "none");
    const el = document.getElementById(tab);
    if(el) el.style.display = "block";
};

/* AUTO RESIZE */
function autoResize(el){
    if(!el) return;
    el.style.height = "auto";
    el.style.height = el.scrollHeight + "px";
}

const camposResize = ["pericias","habilidades","rituais","descricao"];

/* LOAD */
if(id){
    onValue(ref(db,"personagens/"+id), (snap)=>{
        const p = snap.val();
        if(!p) return;

        const i = p.dados?.info || {};
        const c = p.dados?.combate || {};
        const a = p.dados?.atributos || {};
        const e = p.extras || {};

        $("nome").value = i.nome || "";
        $("classe").value = i.classe || "";
        $("origem").value = i.origem || "";
        $("descricao").value = e.descricao || "";

        $("for").value = a.for || 0;
        $("agi").value = a.agi || 0;
        $("int").value = a.int || 0;
        $("vig").value = a.vig || 0;
        $("pre").value = a.pre || 0;
        $("desl").value = a.desl || 0;

        $("defesa").value = c.defesa || 0;
        $("bloqueio").value = c.bloqueio || 0;
        $("esquiva").value = c.esquiva || 0;

        $("hp_atual").value = c.hp_atual || 0;
        $("hp_max").value = c.hp_max || 0;

        $("san_atual").value = c.san_atual || 0;
        $("san_max").value = c.san_max || 0;

        $("pe_atual").value = c.pe_atual || 0;
        $("pe_max").value = c.pe_max || 0;
        $("pe_turno").value = c.pe_turno || 0;

        $("pd_atual").value = c.pd_atual || 0;
        $("pd_max").value = c.pd_max || 0;

        $("arma1").value = c.arma1 || "";
        $("arma2").value = c.arma2 || "";
        $("arma3").value = c.arma3 || "";

        $("pericias").value = e.pericias || "";
        $("habilidades").value = e.habilidades || "";
        $("rituais").value = e.rituais || "";
        $("equipamentos").value = e.equipamentos || "";

        setTimeout(()=>{
            camposResize.forEach(idField=>{
                autoResize($(idField));
            });
        },50);
    });
}

/* SAVE */
async function save(path, key, value){
    if(!id) return;

    try{
        await update(ref(db,"personagens/"+id+"/"+path), {
            [key]: value
        });
    }catch(err){
        console.error("Erro ao salvar:", err);
    }
}

/* INPUTS */
document.querySelectorAll("input, textarea").forEach(el=>{
    if(!el) return;

    el.addEventListener("input", ()=>{
        const v = el.value;
        const n = el.id;

        if(camposResize.includes(n)) autoResize(el);

        /* ATRIBUTOS (número) */
        if(["for","agi","int","vig","pre","desl"].includes(n)){
            save("dados/atributos", n, Number(v));
        }

        /* COMBATE (número quando possível) */
        else if([
            "defesa","bloqueio","esquiva",
            "hp_atual","hp_max",
            "san_atual","san_max",
            "pe_atual","pe_max","pe_turno",
            "pd_atual","pd_max"
        ].includes(n)){
            save("dados/combate", n, Number(v));
        }

        /* ARMAS (string) */
        else if(["arma1","arma2","arma3"].includes(n)){
            save("dados/combate", n, v);
        }

        /* TEXTOS */
        else if(["pericias","habilidades","rituais","equipamentos","descricao"].includes(n)){
            save("extras", n, v);
        }

        /* INFO */
        else{
            save("dados/info", n, v);
        }
    });
});

/* START */
window.onload = () => showTab("info");
</script>

</body>
</html>
