<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FICHA ORDEM CODICE</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

header {
    text-align: center;
    padding: 10px;
    background: #1a1a1a;
    position: sticky;
    top: 0;
}

.tabs {
    display: flex;
    position: sticky;
    top: 44px;
    background: #1f1f1f;
}

.tabs button {
    flex: 1;
    padding: 14px;
    border: none;
    background: #1f1f1f;
    color: white;
}

.tab {
    display: none;
    padding: 12px;
}

input, textarea {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    margin-bottom: 12px;
    box-sizing: border-box;
}

textarea { min-height: 90px; }

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

@media (max-width: 800px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 500px) {
    .grid { grid-template-columns: 1fr; }
}

.cell {
    text-align: center;
}

.label {
    font-size: 12px;
    opacity: 0.7;
    margin-top: 4px;
}

#status {
    position: fixed;
    bottom: 12px;
    right: 12px;
    background: #7c3aed;
    padding: 8px 12px;
    border-radius: 20px;
    font-size: 12px;
}
</style>
</head>

<body>

<header>FICHA ORDEM CODICE</header>

<div class="tabs">
    <button onclick="showTab('info')">Info</button>
    <button onclick="showTab('combat')">Combate</button>
    <button onclick="showTab('skills')">Skills</button>
</div>

<!-- INFO -->
<div id="info" class="tab">
    <input id="nome" placeholder="Nome">
    <input id="classe" placeholder="Classe">
    <input id="origem" placeholder="Origem">
    <textarea id="descricao" placeholder="Descrição"></textarea>
</div>

<!-- COMBATE -->
<div id="combat" class="tab">

<h3>HP</h3>
<div class="grid">
    <div class="cell">
        <input id="hp_atual" type="number">
        <div class="label">HP Atual</div>
    </div>
    <div class="cell">
        <input id="hp_max" type="number">
        <div class="label">HP Máx</div>
    </div>
</div>

<h3>Sanidade</h3>
<div class="grid">
    <div class="cell">
        <input id="san_atual" type="number">
        <div class="label">Sanidade Atual</div>
    </div>
    <div class="cell">
        <input id="san_max" type="number">
        <div class="label">Sanidade Máx</div>
    </div>
</div>

<h3>PD / PE</h3>
<div class="grid">
    <div class="cell">
        <input id="pe_atual" type="number">
        <div class="label">PE Atual</div>
    </div>
    <div class="cell">
        <input id="pe_max" type="number">
        <div class="label">PE Máx</div>
    </div>
    <div class="cell">
        <input id="pd_turno" type="number">
        <div class="label">PD Turno</div>
    </div>
</div>

<h3>Defesa</h3>
<div class="grid">
    <div class="cell"><input id="defesa" type="number"><div class="label">Defesa</div></div>
    <div class="cell"><input id="bloqueio" type="number"><div class="label">Bloqueio</div></div>
    <div class="cell"><input id="esquiva" type="number"><div class="label">Esquiva</div></div>
</div>

<h3>Armas</h3>
<input id="arma1" placeholder="Arma 1">
<input id="arma2" placeholder="Arma 2">
<input id="arma3" placeholder="Arma 3">

</div>

<!-- SKILLS -->
<div id="skills" class="tab">

<h3>Atributos</h3>
<div class="grid">
    <div class="cell"><input id="for" type="number"><div class="label">FOR</div></div>
    <div class="cell"><input id="agi" type="number"><div class="label">AGI</div></div>
    <div class="cell"><input id="int" type="number"><div class="label">INT</div></div>
    <div class="cell"><input id="vig" type="number"><div class="label">VIG</div></div>
    <div class="cell"><input id="pre" type="number"><div class="label">PRE</div></div>
    <div class="cell"><input id="desl" type="number"><div class="label">DESL</div></div>
</div>

<h3>Perícias</h3>
<textarea id="pericias"></textarea>

<h3>Habilidades</h3>
<textarea id="habilidades"></textarea>

<h3>Rituais</h3>
<textarea id="rituais"></textarea>

<h3>Equipamentos</h3>
<textarea id="equipamentos"></textarea>

<h3>Configurações</h3>

<label style="display:block;margin-bottom:10px;">
    <input id="modoPD" type="checkbox">
    Usar modo PD (oculta Sanidade e usa PD)
</label>

</div>

<div id="status">Salvando...</div>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBp6FWCK0IYmeAbCMjdyStz5z1xeUvieV4",
  authDomain: "fichasrpg-45934.firebaseapp.com",
  databaseURL: "https://fichasrpg-45934-default-rtdb.firebaseio.com"
};

const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
const db = getDatabase(app);

const id = new URLSearchParams(location.search).get("id");

let carregando = true;
const $ = (id) => document.getElementById(id);

/* TAB SYSTEM */
function showTab(tab) {
    document.querySelectorAll(".tab").forEach(t => t.style.display = "none");
    $(tab).style.display = "block";
}
window.showTab = showTab;

/* LOAD */
async function load() {
    if (!id) return;

    const snap = await get(child(ref(db), "personagens/" + id));
    if (!snap.exists()) {
        carregando = false;
        return;
    }

    const p = snap.val();
    const i = p.dados?.info || {};
    const c = p.dados?.combate || {};
    const a = p.dados?.atributos || {};
    const e = p.extras || {};
    const cfg = p.config || {};

    $("nome").value = i.nome || "";
    $("classe").value = i.classe || "";
    $("origem").value = i.origem || "";

    $("hp_atual").value = c.hp_atual || 0;
    $("hp_max").value = c.hp_max || 0;

    $("san_atual").value = c.sanidade_atual || 0;
    $("san_max").value = c.sanidade_max || 0;

    $("pe_atual").value = c.pe_atual || 0;
    $("pe_max").value = c.pe_max || 0;
    $("pd_turno").value = c.pd_turno || 0;

    $("defesa").value = c.defesa || 0;
    $("bloqueio").value = c.bloqueio || 0;
    $("esquiva").value = c.esquiva || 0;

    $("for").value = a.for || 0;
    $("agi").value = a.agi || 0;
    $("int").value = a.int || 0;
    $("vig").value = a.vig || 0;
    $("pre").value = a.pre || 0;
    $("desl").value = a.deslocamento || 0;

    $("pericias").value = e.pericias || "";
    $("habilidades").value = e.habilidades || "";
    $("rituais").value = e.rituais || "";
    $("equipamentos").value = e.equipamentos || "";
    $("descricao").value = e.descricao || "";

    $("modoPD").checked = cfg.modoPD || false;

    carregando = false;
}

/* SAVE */
async function save() {
    if (carregando) return;

    const data = {
        dados: {
            info: {
                nome: $("nome").value || "",
                classe: $("classe").value || "",
                origem: $("origem").value || ""
            },
            atributos: {
                for: +$("for").value || 0,
                agi: +$("agi").value || 0,
                int: +$("int").value || 0,
                vig: +$("vig").value || 0,
                pre: +$("pre").value || 0,
                deslocamento: +$("desl").value || 0
            },
            combate: {
                hp_atual: +$("hp_atual").value || 0,
                hp_max: +$("hp_max").value || 0,
                sanidade_atual: +$("san_atual").value || 0,
                sanidade_max: +$("san_max").value || 0,
                pe_atual: +$("pe_atual").value || 0,
                pe_max: +$("pe_max").value || 0,
                pd_turno: +$("pd_turno").value || 0,
                defesa: +$("defesa").value || 0,
                bloqueio: +$("bloqueio").value || 0,
                esquiva: +$("esquiva").value || 0
            }
        },
        extras: {
            pericias: $("pericias").value || "",
            habilidades: $("habilidades").value || "",
            rituais: $("rituais").value || "",
            equipamentos: $("equipamentos").value || "",
            descricao: $("descricao").value || ""
        },
        config: {
            modoPD: $("modoPD").checked
        }
    };

    await set(ref(db, "personagens/" + id), data);
}

setInterval(save, 5000);

window.onload = () => {
    showTab("info");
    load();
};
</script>

</body>
</html>
