<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>

<body>

<h2>Painel</h2>

<input id="nome" placeholder="Nome"><br><br>
<input id="hp" type="number" placeholder="HP"><br><br>
<input id="max" type="number" placeholder="MAX"><br><br>

<button onclick="salvar()">Salvar</button>
<button onclick="dano(10)">-10 HP</button>
<button onclick="cura(10)">+10 HP</button>

<script>

const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "fichasrpg-45934.firebaseapp.com",
  databaseURL: "https://fichasrpg-45934-default-rtdb.firebaseio.com",
  projectId: "fichasrpg-45934"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔥 pega ID da URL
const params = new URLSearchParams(window.location.search);
const id = params.get("id") || "1";

const ref = db.ref("players/" + id);

// 🔥 CARREGA dados ao abrir
ref.on("value", snap => {
    const data = snap.val();
    if (!data) return;

    document.getElementById("nome").value = data.nome || "";
    document.getElementById("hp").value = data.hp || 0;
    document.getElementById("max").value = data.max || 0;
});

// 🔥 SALVAR (sem sobrescrever tudo)
function salvar() {
    let nome = document.getElementById("nome").value;
    let hp = parseInt(document.getElementById("hp").value) || 0;
    let max = parseInt(document.getElementById("max").value) || 1;

    if (max <= 0) max = 1;
    hp = Math.max(0, Math.min(hp, max));

    ref.update({
        nome: nome,
        hp: hp,
        max: max
    });
}

// 🔥 DANO
function dano(valor) {
    ref.child("hp").once("value", snap => {
        let hp = snap.val() || 0;
        let novo = Math.max(0, hp - valor);
        ref.update({ hp: novo });
    });
}

// 🔥 CURA
function cura(valor) {
    ref.once("value", snap => {
        let data = snap.val();
        if (!data) return;

        let hp = data.hp || 0;
        let max = data.max || 1;

        let novo = Math.min(max, hp + valor);
        ref.update({ hp: novo });
    });
}

</script>

</body>
</html>
