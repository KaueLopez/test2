<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel RPG</title>

<style>
body { font-family: Arial; margin: 20px; }
button { padding: 10px; margin-bottom: 10px; cursor: pointer; }

.personagem {
    padding: 10px;
    border: 1px solid #ccc;
    margin-bottom: 5px;
    cursor: pointer;
}
</style>
</head>

<body>

<h2>Painel de Personagens</h2>

<button onclick="criarPersonagem()">➕ Novo Personagem</button>
<button onclick="carregar()">🔄 Atualizar</button>

<div id="lista"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, child, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBp6FWCK0IYmeAbCMjdyStz5z1xeUvieV4",
  authDomain: "fichasrpg-45934.firebaseapp.com",
  databaseURL: "https://fichasrpg-45934-default-rtdb.firebaseio.com",
  projectId: "fichasrpg-45934",
  storageBucket: "fichasrpg-45934.firebasestorage.app",
  messagingSenderId: "523682127281",
  measurementId: "G-L22V165GJX"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.db = db;
window.ref = ref;
window.set = set;
window.get = get;
window.child = child;
window.push = push;
</script>

<script>

// ➕ CRIAR PERSONAGEM
function criarPersonagem() {
    const novo = push(ref(db, "personagens"));

    set(novo, {
        id: novo.key,
        nome: "Novo Personagem",
        evento: "",
        social: ""
    }).then(() => carregar());
}

// 📋 LISTAR
function carregar() {
    get(child(ref(db), "personagens")).then(snap => {
        const lista = document.getElementById("lista");
        lista.innerHTML = "";

        if (!snap.exists()) return;

        const data = snap.val();

        Object.keys(data).forEach(id => {
            const p = data[id];

            const div = document.createElement("div");
            div.className = "personagem";
            div.innerHTML = p.nome;

            div.onclick = () => {
                window.location.href = "editor.html?id=" + id;
            };

            lista.appendChild(div);
        });
    });
}

window.onload = carregar;

</script>

</body>
</html>
