<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>

<body>

<h2>Painel</h2>

<input id="nome" placeholder="Nome"><br><br>
<input id="hp" type="number" placeholder="HP"><br><br>
<input id="max" type="number" placeholder="MAX"><br><br>

<button onclick="salvar()">Salvar</button>
<button onclick="dano(10)">-10 HP</button>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBp6FWCK0IYmeAbCMjdyStz5z1xeUvieV4",
  authDomain: "fichasrpg-45934.firebaseapp.com",
  databaseURL: "https://fichasrpg-45934-default-rtdb.firebaseio.com",
  projectId: "fichasrpg-45934"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const params = new URLSearchParams(window.location.search);
const id = params.get("id") || "1";

function salvar() {
    db.ref("players/" + id).set({
        nome: document.getElementById("nome").value,
        hp: parseInt(document.getElementById("hp").value),
        max: parseInt(document.getElementById("max").value)
    });
}

function dano(valor) {
    db.ref("players/" + id + "/hp").once("value", snap => {
        let hp = snap.val();
        db.ref("players/" + id + "/hp").set(hp - valor);
    });
}

</script>

</body>
</html>
