<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Editor Ordem Paranormal</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #0a0a0a;
    color: #eaeaea;
}

/* CONTAINER */
.box {
    max-width: 1100px;
    margin: auto;
    background: #121212;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 20px;
}

/* INPUTS */
input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #fff;
    color: #000;
    font-size: 14px;
    box-sizing: border-box;
}

/* TÍTULO */
h2 {
    text-align: center;
    margin-bottom: 20px;
}

h3 {
    margin-top: 20px;
    margin-bottom: 10px;
    padding: 8px 10px;
    background: #1f1f1f;
    border-left: 4px solid #7c3aed;
    border-radius: 6px;
    font-size: 14px;
}

/* SEÇÃO */
.section {
    margin-bottom: 18px;
    padding-bottom: 10px;
    border-bottom: 1px solid #2a2a2a;
}

/* GRID CORRETO */
.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

/* LABEL VISUAL */
.label {
    font-size: 11px;
    color: #aaa;
    text-align: center;
    margin-top: 4px;
}

/* BLOCO DE CAMPO */
.field {
    display: flex;
    flex-direction: column;
}

/* RESPONSIVO */
@media (max-width: 768px) {
    .grid {
        grid-template-columns: repeat(2, 1fr);
    }
}
</style>
</head>

<body>

<h2>Ordem Paranormal</h2>

<div class="box">

<!-- INFO -->
<div class="section">
    <h3>Informações</h3>
    <input id="nome" placeholder="Nome">
    <input id="origem" placeholder="Origem">
    <input id="classe" placeholder="Classe">
</div>

<!-- ATRIBUTOS -->
<div class="section">
    <h3>Atributos</h3>

    <div class="grid">
        <div class="field">
            <input id="agi" type="number">
            <div class="label">AGI</div>
        </div>

        <div class="field">
            <input id="for" type="number">
            <div class="label">FOR</div>
        </div>

        <div class="field">
            <input id="int" type="number">
            <div class="label">INT</div>
        </div>

        <div class="field">
            <input id="vig" type="number">
            <div class="label">VIG</div>
        </div>

        <div class="field">
            <input id="pre" type="number">
            <div class="label">PRE</div>
        </div>

        <div class="field">
            <input id="nivel" type="number">
            <div class="label">NÍVEL</div>
        </div>
    </div>

    <input id="nex" type="number" placeholder="NEX">
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({
  apiKey: "xxx",
  authDomain: "xxx",
  databaseURL: "xxx"
});

const db = getDatabase(app);

let id = new URLSearchParams(location.search).get("id");
let carregando = true;

/* ===== LOAD ===== */
get(child(ref(db), "personagens/" + id)).then(snap => {

    const p = snap.val() || {};
    const i = p.dados?.info || {};
    const a = p.dados?.atributos || {};

    nome.value = i.nome || "";
    origem.value = i.origem || "";
    classe.value = i.classe || "";

    agi.value = a.agi || 0;
    for.value = a.for || 0;
    int.value = a.int || 0;
    vig.value = a.vig || 0;
    pre.value = a.pre || 0;
    nivel.value = a.nivel || 0;
    nex.value = a.nex || 0;

    carregando = false;
});

/* ===== SAVE (mais seguro) ===== */
setInterval(() => {
    if (carregando || !id) return;

    set(ref(db, "personagens/" + id), {
        tipo: "ordem",
        dados: {
            info: {
                nome: nome.value,
                origem: origem.value,
                classe: classe.value
            },
            atributos: {
                agi: +agi.value || 0,
                for: +for.value || 0,
                int: +int.value || 0,
                vig: +vig.value || 0,
                pre: +pre.value || 0,
                nivel: +nivel.value || 0,
                nex: +nex.value || 0
            }
        }
    });

}, 600);

</script>

</body>
</html>
