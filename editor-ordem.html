<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FICHA ORDEM CODICE</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #0a0a0a;
    color: #eaeaea;
}

.box {
    max-width: 1100px;
    margin: auto;
    background: #121212;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 20px;
}

h3 {
    margin-top: 20px;
    padding: 8px;
    background: #1f1f1f;
    border-left: 4px solid #7c3aed;
    border-radius: 6px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 12px;
    border-radius: 8px;
    border: none;
    background: #fff;
    color: #000;
    font-size: 14px;
    box-sizing: border-box;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

label {
    font-size: 12px;
    color: #bbb;
}
</style>
</head>

<body>

<div class="box">

<h3>Informações</h3>
<input id="nome" placeholder="Nome">
<input id="classe" placeholder="Classe">
<input id="origem" placeholder="Origem">

<h3>Combate</h3>

<div class="grid">
    <div><label>HP Atual</label><input id="hp_atual" type="number"></div>
    <div><label>HP Máx</label><input id="hp_max" type="number"></div>
</div>

<div class="grid">
    <div><label>Sanidade Atual</label><input id="san_atual" type="number"></div>
    <div><label>Sanidade Máx</label><input id="san_max" type="number"></div>
</div>

<div class="grid">
    <div><label>PE Atual</label><input id="pe_atual" type="number"></div>
    <div><label>PE Máx</label><input id="pe_max" type="number"></div>
    <div><label>PE/PD Turno</label><input id="pe_turno" type="number"></div>
</div>

<div class="grid">
    <div><label>PD Atual</label><input id="pd_atual" type="number"></div>
    <div><label>PD Máx</label><input id="pd_max" type="number"></div>
</div>

<div class="grid">
    <div><label>Defesa</label><input id="defesa" type="number"></div>
    <div><label>Bloqueio</label><input id="bloqueio" type="number"></div>
    <div><label>Esquiva</label><input id="esquiva" type="number"></div>
</div>

<h3>Armas</h3>
<input id="arma1">
<input id="arma2">
<input id="arma3">

<h3>Atributos</h3>

<div class="grid">
    <div><label>FOR</label><input id="for" type="number"></div>
    <div><label>AGI</label><input id="agi" type="number"></div>
    <div><label>INT</label><input id="int" type="number"></div>
    <div><label>VIG</label><input id="vig" type="number"></div>
    <div><label>PRE</label><input id="pre" type="number"></div>
    <div><label>DESL</label><input id="desl" type="number"></div>
</div>

<h3>Perícias</h3>
<textarea id="pericias"></textarea>

<h3>Habilidades</h3>
<textarea id="habilidades"></textarea>

<h3>Rituais</h3>
<textarea id="rituais"></textarea>

<h3>Equipamentos</h3>
<textarea id="equipamentos"></textarea>

<h3>Descrição</h3>
<textarea id="descricao"></textarea>
    
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSyBp6FWCK0IYmeAbCMjdyStz5z1xeUvieV4",
  authDomain: "fichasrpg-45934.firebaseapp.com",
  databaseURL: "https://fichasrpg-45934-default-rtdb.firebaseio.com"
});

const db = getDatabase(app);
const id = new URLSearchParams(location.search).get("id");

const $ = (id) => document.getElementById(id);

let carregando = true;
let userEditing = false;

/* DEBUG (não seja cego) */
console.log("ID:", id);

/* evita overwrite durante edição */
document.querySelectorAll("input, textarea").forEach(el=>{
    el.addEventListener("focus", ()=> userEditing = true);
    el.addEventListener("blur", ()=> userEditing = false);
});

/* realtime sync */
onValue(ref(db,"personagens/"+id), (snap)=>{
    if(!snap.exists() || userEditing) return;

    const p = snap.val();

    const i = p.dados?.info || {};
    const c = p.dados?.combate || {};
    const a = p.dados?.atributos || {};
    const e = p.extras || {};

    /* INFO */
    if($("nome")) $("nome").value = i.nome || "";
    if($("classe")) $("classe").value = i.classe || "";
    if($("origem")) $("origem").value = i.origem || "";

    /* COMBATE */
    if($("hp_atual")) $("hp_atual").value = c.hp_atual || 0;
    if($("hp_max")) $("hp_max").value = c.hp_max || 0;

    if($("san_atual")) $("san_atual").value = c.sanidade_atual || 0;
    if($("san_max")) $("san_max").value = c.sanidade_max || 0;

    if($("pe_atual")) $("pe_atual").value = c.pe_atual || 0;
    if($("pe_max")) $("pe_max").value = c.pe_max || 0;
    if($("pe_turno")) $("pe_turno").value = c.pe_turno || 0;

    if($("pd_atual")) $("pd_atual").value = c.pd_atual || 0;
    if($("pd_max")) $("pd_max").value = c.pd_max || 0;

    if($("defesa")) $("defesa").value = c.defesa || 0;
    if($("bloqueio")) $("bloqueio").value = c.bloqueio || 0;
    if($("esquiva")) $("esquiva").value = c.esquiva || 0;

    if($("arma1")) $("arma1").value = c.arma1 || "";
    if($("arma2")) $("arma2").value = c.arma2 || "";
    if($("arma3")) $("arma3").value = c.arma3 || "";

    /* ATRIBUTOS */
    if($("for")) $("for").value = a.for || 0;
    if($("agi")) $("agi").value = a.agi || 0;
    if($("int")) $("int").value = a.int || 0;
    if($("vig")) $("vig").value = a.vig || 0;
    if($("pre")) $("pre").value = a.pre || 0;
    if($("desl")) $("desl").value = a.desl || 0;

    /* EXTRAS */
    if($("pericias")) $("pericias").value = e.pericias || "";
    if($("habilidades")) $("habilidades").value = e.habilidades || "";
    if($("rituais")) $("rituais").value = e.rituais || "";
    if($("equipamentos")) $("equipamentos").value = e.equipamentos || "";
    if($("descricao")) $("descricao").value = e.descricao || "";

    carregando = false;
});

/* bind seguro */
function bind(idField, path, key){
    const el = $(idField);
    if(!el) {
        console.warn("Campo não encontrado:", idField);
        return;
    }

    el.addEventListener("input", async ()=>{
        if(carregando) return;

        const value = el.value;

        /* converte número corretamente */
        const parsed = value === "" ? "" : (isNaN(value) ? value : Number(value));

        try{
            await update(ref(db,"personagens/"+id+"/"+path), {
                [key]: parsed
            });
        }catch(err){
            console.error("Erro ao salvar:", err);
        }
    });
}

/* BINDS */

/* INFO */
bind("nome","dados/info","nome");
bind("classe","dados/info","classe");
bind("origem","dados/info","origem");

/* COMBATE */
bind("hp_atual","dados/combate","hp_atual");
bind("hp_max","dados/combate","hp_max");

bind("san_atual","dados/combate","sanidade_atual");
bind("san_max","dados/combate","sanidade_max");

bind("pe_atual","dados/combate","pe_atual");
bind("pe_max","dados/combate","pe_max");
bind("pe_turno","dados/combate","pe_turno");

bind("pd_atual","dados/combate","pd_atual");
bind("pd_max","dados/combate","pd_max");

/* DEFESA */
bind("defesa","dados/combate","defesa");
bind("bloqueio","dados/combate","bloqueio");
bind("esquiva","dados/combate","esquiva");

/* ARMAS */
bind("arma1","dados/combate","arma1");
bind("arma2","dados/combate","arma2");
bind("arma3","dados/combate","arma3");

/* ATRIBUTOS */
bind("for","dados/atributos","for");
bind("agi","dados/atributos","agi");
bind("int","dados/atributos","int");
bind("vig","dados/atributos","vig");
bind("pre","dados/atributos","pre");
bind("desl","dados/atributos","desl");

/* EXTRAS */
bind("pericias","extras","pericias");
bind("habilidades","extras","habilidades");
bind("rituais","extras","rituais");
bind("equipamentos","extras","equipamentos");
bind("descricao","extras","descricao");

</script>

</body>
</html>
