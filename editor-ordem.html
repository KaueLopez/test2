<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Editor Ordem Paranormal</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #0a0a0a;
    color: #eaeaea;
}

.box {
    max-width: 1100px;
    margin: auto;
    background: #121212;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 20px;
}

h2 {
    text-align: center;
}

h3 {
    margin-top: 20px;
    padding: 8px;
    background: #1f1f1f;
    border-left: 4px solid #7c3aed;
    border-radius: 6px;
    font-size: 14px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 12px;
    border-radius: 8px;
    border: none;
    background: #fff;
    color: #000;
    font-size: 14px;
    box-sizing: border-box;
}

textarea {
    min-height: 80px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.field {
    display: flex;
    flex-direction: column;
}

label {
    font-size: 12px;
    color: #bbb;
    margin-bottom: 4px;
}

@media (max-width: 768px) {
    .grid {
        grid-template-columns: repeat(2, 1fr);
    }
}
</style>
</head>

<body>

<h2>Ordem Paranormal</h2>

<div class="box">

<!-- INFO -->
<h3>Informações</h3>

<div class="field"><label>Nome</label><input id="nome"></div>
<div class="field"><label>Origem</label><input id="origem"></div>
<div class="field"><label>Classe</label><input id="classe"></div>

<!-- SAÚDE -->
<h3>Saúde</h3>

<div class="grid">
<div class="field"><label>HP Atual</label><input id="hp_atual" type="number"></div>
<div class="field"><label>HP Máximo</label><input id="hp_max" type="number"></div>
</div>

<div class="grid">
<div class="field"><label>PD/PE Atual</label><input id="pe_atual" type="number"></div>
<div class="field"><label>PD/PE Máximo</label><input id="pe_max" type="number"></div>
</div>

<div class="grid">
<div class="field"><label>Defesa</label><input id="defesa" type="number"></div>
<div class="field"><label>Bloqueio</label><input id="bloqueio" type="number"></div>
<div class="field"><label>Esquiva</label><input id="esquiva" type="number"></div>
</div>

<div class="grid">
<div class="field"><label>Nível</label><input id="nivel" type="number"></div>
<div class="field"><label>NEX</label><input id="nex" type="number"></div>
</div>

<!-- ATRIBUTOS -->
<h3>Atributos</h3>

<div class="grid">
<div class="field"><label>AGI</label><input id="agi" type="number"></div>
<div class="field"><label>FOR</label><input id="for" type="number"></div>
<div class="field"><label>INT</label><input id="int" type="number"></div>
<div class="field"><label>VIG</label><input id="vig" type="number"></div>
<div class="field"><label>PRE</label><input id="pre" type="number"></div>
<div class="field"><label>Deslocamento</label><input id="deslocamento" type="number"></div>
</div>

<!-- COMBATE -->
<h3>Combate</h3>

<div class="field">
<label>Arma 1</label>
<input id="arma1" type="text">
</div>

<div class="field">
<label>Arma 2</label>
<input id="arma2" type="text">
</div>

<div class="field">
<label>Arma 3</label>
<input id="arma3" type="text">
</div>

<!-- PERÍCIAS -->
<h3>Perícias</h3>
<div class="field">
<textarea id="pericias"></textarea>
</div>

<!-- HABILIDADES -->
<h3>Habilidades</h3>
<div class="field">
<textarea id="hab_texto"></textarea>
</div>

<h3>Defesas / Extras</h3>

<div class="field"><label>Proteção</label><textarea id="hab_protecao"></textarea></div>
<div class="field"><label>Resistências</label><textarea id="hab_resistencias"></textarea></div>
<div class="field"><label>Proficiências</label><textarea id="hab_proficiencias"></textarea></div>

<h3>Rituais</h3>
<div class="field"><textarea id="rituais"></textarea></div>

<h3>Outros</h3>
<div class="field"><textarea id="descricao"></textarea></div>
<div class="field"><textarea id="equipamentos"></textarea></div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSyBp6FWCK0IYmeAbCMjdyStz5z1xeUvieV4",
  authDomain: "fichasrpg-45934.firebaseapp.com",
  databaseURL: "https://fichasrpg-45934-default-rtdb.firebaseio.com"
});

const db = getDatabase(app);

const id = new URLSearchParams(location.search).get("id");

let carregando = true;

/* ELEMENTOS */
const nome = document.getElementById("nome");
const origem = document.getElementById("origem");
const classe = document.getElementById("classe");

const hp_atual = document.getElementById("hp_atual");
const hp_max = document.getElementById("hp_max");

const pe_atual = document.getElementById("pe_atual");
const pe_max = document.getElementById("pe_max");

const defesa = document.getElementById("defesa");
const bloqueio = document.getElementById("bloqueio");
const esquiva = document.getElementById("esquiva");

const nivel = document.getElementById("nivel");
const nex = document.getElementById("nex");

const agi = document.getElementById("agi");
const forca = document.getElementById("for");
const int = document.getElementById("int");
const vig = document.getElementById("vig");
const pre = document.getElementById("pre");
const deslocamento = document.getElementById("deslocamento");

const pericias = document.getElementById("pericias");

const hab_texto = document.getElementById("hab_texto");
const hab_protecao = document.getElementById("hab_protecao");
const hab_resistencias = document.getElementById("hab_resistencias");
const hab_proficiencias = document.getElementById("hab_proficiencias");

const rituais = document.getElementById("rituais");
const descricao = document.getElementById("descricao");
const equipamentos = document.getElementById("equipamentos");

const arma1 = document.getElementById("arma1");
const arma2 = document.getElementById("arma2");
const arma3 = document.getElementById("arma3");

/* LOAD */
async function carregar() {
    if (!id) return;

    const snap = await get(child(ref(db), "personagens/" + id));
    if (!snap.exists()) return;

    const p = snap.val();

    const i = p.dados?.info || {};
    const a = p.dados?.atributos || {};
    const c = p.dados?.combate || {};

    nome.value = i.nome || "";
    origem.value = i.origem || "";
    classe.value = i.classe || "";

    hp_atual.value = c.hp_atual || 0;
    hp_max.value = c.hp_max || 0;

    pe_atual.value = c.pe_atual || 0;
    pe_max.value = c.pe_max || 0;

    defesa.value = c.defesa || 0;
    bloqueio.value = c.bloqueio || 0;
    esquiva.value = c.esquiva || 0;

    nivel.value = c.nivel || 0;
    nex.value = c.nex || 0;

    agi.value = a.agi || 0;
    forca.value = a.for || 0;
    int.value = a.int || 0;
    vig.value = a.vig || 0;
    pre.value = a.pre || 0;
    deslocamento.value = a.deslocamento || 0;

    pericias.value = p.pericias || "";

    hab_texto.value = p.habilidades || "";
    hab_protecao.value = p.hab_protecao || "";
    hab_resistencias.value = p.hab_resistencias || "";
    hab_proficiencias.value = p.hab_proficiencias || "";

    rituais.value = p.rituais || "";
    descricao.value = p.descricao || "";
    equipamentos.value = p.equipamentos || "";

    arma1.value = c.arma1 || "";
    arma2.value = c.arma2 || "";
    arma3.value = c.arma3 || "";

    carregando = false;
}

/* SAVE */
function salvar() {
    if (!id || carregando) return;

    const data = {
        tipo: "ordem",
        dados: {
            info: { nome: nome.value, origem: origem.value, classe: classe.value },
            atributos: {
                agi: +agi.value || 0,
                for: +forca.value || 0,
                int: +int.value || 0,
                vig: +vig.value || 0,
                pre: +pre.value || 0,
                deslocamento: +deslocamento.value || 0
            },
            combate: {
                hp_atual: +hp_atual.value || 0,
                hp_max: +hp_max.value || 0,
                pe_atual: +pe_atual.value || 0,
                pe_max: +pe_max.value || 0,
                defesa: +defesa.value || 0,
                bloqueio: +bloqueio.value || 0,
                esquiva: +esquiva.value || 0,
                nivel: +nivel.value || 0,
                nex: +nex.value || 0,
                arma1: arma1.value || "",
                arma2: arma2.value || "",
                arma3: arma3.value || ""
            }
        },

        pericias: pericias.value || "",
        habilidades: hab_texto.value || "",
        hab_protecao: hab_protecao.value || "",
        hab_resistencias: hab_resistencias.value || "",
        hab_proficiencias: hab_proficiencias.value || "",
        rituais: rituais.value || "",
        descricao: descricao.value || "",
        equipamentos: equipamentos.value || ""
    };

    set(ref(db, "personagens/" + id), data);
}

/* AUTO SAVE */
setInterval(() => salvar(), 5000);

window.onload = carregar;
</script>

</body>
</html>
