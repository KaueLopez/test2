<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Editor Ordem Paranormal</title>

<style>
body {
    font-family: Arial;
    margin: 20px;
    background: #0a0a0a;
    color: #eaeaea;
}

.box {
    max-width: 1200px;
    margin: auto;
    background: #121212;
    border-radius: 12px;
    padding: 20px;
    border: 1px solid #2a2a2a;
}

h2 {
    text-align: center;
}

h3 {
    margin-top: 25px;
    padding: 8px;
    background: #1f1f1f;
    border-left: 4px solid #7c3aed;
    border-radius: 6px;
    font-size: 14px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: none;
    background: #fff;
    color: #000;
    box-sizing: border-box;
}

textarea {
    min-height: 80px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.field {
    display: flex;
    flex-direction: column;
}

.label {
    font-size: 11px;
    color: #aaa;
    text-align: center;
    margin-top: 3px;
}

/* separação clara entre blocos */
.section {
    margin-bottom: 25px;
    padding-bottom: 15px;
    border-bottom: 1px solid #2a2a2a;
}
</style>
</head>

<body>

<h2>Ordem Paranormal</h2>

<div class="box">

<!-- ================= INFO ================= -->
<div class="section">
<h3>Informações</h3>

<input id="nome" placeholder="Nome">
<input id="origem" placeholder="Origem">
<input id="classe" placeholder="Classe">
</div>

<!-- ================= ATRIBUTOS ================= -->
<div class="section">
<h3>Atributos</h3>

<div class="grid">
<div class="field"><input id="agi" type="number"><div class="label">AGI</div></div>
<div class="field"><input id="for" type="number"><div class="label">FOR</div></div>
<div class="field"><input id="int" type="number"><div class="label">INT</div></div>
<div class="field"><input id="vig" type="number"><div class="label">VIG</div></div>
<div class="field"><input id="pre" type="number"><div class="label">PRE</div></div>
<div class="field"><input id="nivel" type="number"><div class="label">NÍVEL</div></div>
</div>

<input id="nex" type="number" placeholder="NEX">
</div>

<!-- ================= COMBATE ================= -->
<div class="section">
<h3>Combate</h3>

<input id="hp_max" type="number" placeholder="HP Máximo">
<input id="hp_atual" type="number" placeholder="HP Atual">
<input id="defesa" type="number" placeholder="Defesa">
</div>

<!-- ================= PERICIAS ================= -->
<div class="section">
<h3>Perícias</h3>
<textarea id="pericias"></textarea>
</div>

<!-- ================= HABILIDADES ================= -->
<div class="section">
<h3>Habilidades</h3>
<textarea id="habilidades"></textarea>
</div>

<!-- ================= RITUAIS ================= -->
<div class="section">
<h3>Rituais</h3>
<textarea id="rituais"></textarea>
</div>

<!-- ================= DESCRIÇÃO ================= -->
<div class="section">
<h3>Descrição</h3>

<textarea id="anotacoes" placeholder="Anotações"></textarea>
<textarea id="aparencia" placeholder="Aparência"></textarea>
<textarea id="personalidade" placeholder="Personalidade"></textarea>
<textarea id="historia" placeholder="História"></textarea>
<textarea id="objetivo" placeholder="Objetivo"></textarea>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({
  apiKey: "xxx",
  authDomain: "xxx",
  databaseURL: "xxx"
});

const db = getDatabase(app);

let id = new URLSearchParams(location.search).get("id");
let carregando = true;

/* LOAD */
get(child(ref(db), "personagens/" + id)).then(snap => {

    const p = snap.val() || {};
    const d = p.dados || {};
    const i = d.info || {};
    const a = d.atributos || {};
    const c = d.combate || {};
    const desc = d.descricao || {};

    nome.value = i.nome || "";
    origem.value = i.origem || "";
    classe.value = i.classe || "";

    agi.value = a.agi || 0;
    for.value = a.for || 0;
    int.value = a.int || 0;
    vig.value = a.vig || 0;
    pre.value = a.pre || 0;
    nivel.value = a.nivel || 0;
    nex.value = a.nex || 0;

    hp_max.value = c.hp_max || 0;
    hp_atual.value = c.hp_atual || 0;
    defesa.value = c.defesa || 0;

    pericias.value = d.pericias || "";
    habilidades.value = d.habilidades?.texto || "";
    rituais.value = d.rituais || "";

    anotacoes.value = desc.anotacoes || "";
    aparencia.value = desc.aparencia || "";
    personalidade.value = desc.personalidade || "";
    historia.value = desc.historia || "";
    objetivo.value = desc.objetivo || "";

    carregando = false;
});

/* SAVE */
setInterval(() => {
    if (carregando || !id) return;

    set(ref(db, "personagens/" + id), {
        tipo: "ordem",
        dados: {
            info: {
                nome: nome.value,
                origem: origem.value,
                classe: classe.value
            },
            atributos: {
                agi: +agi.value || 0,
                for: +for.value || 0,
                int: +int.value || 0,
                vig: +vig.value || 0,
                pre: +pre.value || 0,
                nivel: +nivel.value || 0,
                nex: +nex.value || 0
            },
            combate: {
                hp_max: +hp_max.value || 0,
                hp_atual: +hp_atual.value || 0,
                defesa: +defesa.value || 0
            },
            pericias: pericias.value,
            habilidades: {
                texto: habilidades.value
            },
            rituais: rituais.value,
            descricao: {
                anotacoes: anotacoes.value,
                aparencia: aparencia.value,
                personalidade: personalidade.value,
                historia: historia.value,
                objetivo: objetivo.value
            }
        }
    });

}, 600);

</script>

</body>
</html>
