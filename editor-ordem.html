<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Editor Ordem Paranormal</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #0a0a0a;
    color: #eaeaea;
}

.box {
    max-width: 1100px;
    margin: auto;
    background: #121212;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 20px;
}

h2 {
    text-align: center;
}

h3 {
    margin-top: 20px;
    padding: 8px;
    background: #1f1f1f;
    border-left: 4px solid #7c3aed;
    border-radius: 6px;
    font-size: 14px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 12px;
    border-radius: 8px;
    border: none;
    background: #fff;
    color: #000;
    font-size: 14px;
    box-sizing: border-box;
}

textarea {
    min-height: 80px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.field {
    display: flex;
    flex-direction: column;
}

label {
    font-size: 12px;
    color: #bbb;
    margin-bottom: 4px;
}

@media (max-width: 768px) {
    .grid {
        grid-template-columns: repeat(2, 1fr);
    }
}
</style>
</head>

<body>

<h2>Ordem Paranormal</h2>

<div class="box">

<h3>Informações</h3>

<div class="field"><label>Nome</label><input id="nome"></div>
<div class="field"><label>Origem</label><input id="origem"></div>
<div class="field"><label>Classe</label><input id="classe"></div>

<h3>Saúde</h3>

<div class="grid">
<div class="field"><label>HP Atual</label><input id="hp_atual" type="number"></div>
<div class="field"><label>HP Máximo</label><input id="hp_max" type="number"></div>
<div class="field"><label>Defesa</label><input id="defesa" type="number"></div>
</div>

<h3>Atributos</h3>

<div class="grid">
<div class="field"><label>AGI</label><input id="agi" type="number"></div>
<div class="field"><label>FOR</label><input id="for" type="number"></div>
<div class="field"><label>INT</label><input id="int" type="number"></div>
<div class="field"><label>VIG</label><input id="vig" type="number"></div>
<div class="field"><label>PRE</label><input id="pre" type="number"></div>
<div class="field"><label>NÍVEL</label><input id="nivel" type="number"></div>
</div>

<div class="field">
<label>NEX</label>
<input id="nex" type="number">
</div>

<!-- PERÍCIAS CORRIGIDO -->
<h3>Perícias</h3>
<div class="field">
<label>Lista de Perícias</label>
<textarea id="pericias"></textarea>
</div>

<h3>Habilidades</h3>

<div class="field">
<label>Texto</label>
<textarea id="hab_texto"></textarea>
</div>

<div class="grid">
<div class="field"><label>Proteção</label><input id="hab_protecao" type="number"></div>
<div class="field"><label>Resistências</label><input id="hab_resistencias" type="number"></div>
<div class="field"><label>Proficiências</label><input id="hab_proficiencias" type="number"></div>
</div>

<h3>Rituais</h3>

<div class="field">
<label>Rituais</label>
<textarea id="rituais"></textarea>
</div>

<h3>Outros</h3>

<div class="field">
<label>Descrição</label>
<textarea id="descricao"></textarea>
</div>

<div class="field">
<label>Equipamentos</label>
<textarea id="equipamentos"></textarea>
</div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSyBp6FWCK0IYmeAbCMjdyStz5z1xeUvieV4",
  authDomain: "fichasrpg-45934.firebaseapp.com",
  databaseURL: "https://fichasrpg-45934-default-rtdb.firebaseio.com"
});

const db = getDatabase(app);

const id = new URLSearchParams(location.search).get("id");

let carregando = true;

/* ELEMENTOS */
const nome = document.getElementById("nome");
const origem = document.getElementById("origem");
const classe = document.getElementById("classe");

const agi = document.getElementById("agi");
const forca = document.getElementById("for");
const int = document.getElementById("int");
const vig = document.getElementById("vig");
const pre = document.getElementById("pre");
const nivel = document.getElementById("nivel");
const nex = document.getElementById("nex");

const hp_atual = document.getElementById("hp_atual");
const hp_max = document.getElementById("hp_max");
const defesa = document.getElementById("defesa");

const pericias = document.getElementById("pericias");

const hab_texto = document.getElementById("hab_texto");
const rituais = document.getElementById("rituais");

/* LOAD */
async function carregar() {
    if (!id) return;

    const snap = await get(child(ref(db), "personagens/" + id));
    if (!snap.exists()) return;

    const p = snap.val();

    const i = p.dados?.info || {};
    const a = p.dados?.atributos || {};
    const c = p.dados?.combate || {};

    nome.value = i.nome || "";
    origem.value = i.origem || "";
    classe.value = i.classe || "";

    agi.value = a.agi || 0;
    forca.value = a.for || 0;
    int.value = a.int || 0;
    vig.value = a.vig || 0;
    pre.value = a.pre || 0;
    nivel.value = a.nivel || 0;
    nex.value = a.nex || 0;

    hp_max.value = c.hp_max || 0;
    hp_atual.value = c.hp_atual || 0;
    defesa.value = c.defesa || 0;

    pericias.value = p.pericias || "";

    hab_texto.value = p.habilidades || "";
    rituais.value = p.rituais || "";

    carregando = false;
}

/* SAVE */
function salvar() {
    if (!id || carregando) return;

    const data = {
        tipo: "ordem",
        dados: {
            info: {
                nome: nome.value,
                origem: origem.value,
                classe: classe.value
            },
            atributos: {
                agi: +agi.value || 0,
                for: +forca.value || 0,
                int: +int.value || 0,
                vig: +vig.value || 0,
                pre: +pre.value || 0,
                nivel: +nivel.value || 0,
                nex: +nex.value || 0
            },
            combate: {
                hp_max: +hp_max.value || 0,
                hp_atual: +hp_atual.value || 0,
                defesa: +defesa.value || 0
            }
        },
        pericias: pericias.value || "",
        habilidades: hab_texto.value || "",
        rituais: rituais.value || ""
    };

    set(ref(db, "personagens/" + id), data)
        .then(() => console.log("Salvo"))
        .catch(err => console.error("Erro ao salvar:", err));
}

/* AUTO SAVE */
setInterval(() => {
    salvar();
}, 5000);

/* INIT */
window.onload = carregar;
</script>

</body>
</html>
