<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Editor PC Ordem Paranormal</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #0a0a0a;
    color: #eaeaea;
}

.box {
    max-width: 1100px;
    margin: auto;
    background: #121212;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 20px;
}

h3 {
    margin-top: 20px;
    padding: 8px;
    background: #1f1f1f;
    border-left: 4px solid #7c3aed;
    border-radius: 6px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 12px;
    border-radius: 8px;
    border: none;
    background: #fff;
    color: #000;
    font-size: 14px;
    box-sizing: border-box;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.field {
    display: flex;
    flex-direction: column;
}

label {
    font-size: 12px;
    color: #bbb;
}

@media (max-width: 800px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>

<body>

<div class="box">

<h3>Informações</h3>
<input id="nome" placeholder="Nome">
<input id="classe" placeholder="Classe">
<input id="origem" placeholder="Origem">

<h3>Combate</h3>

<div class="grid">
    <div><label>HP Atual</label><input id="hp_atual" type="number"></div>
    <div><label>HP Máx</label><input id="hp_max" type="number"></div>
</div>

<div class="grid">
    <div><label>Sanidade Atual</label><input id="san_atual" type="number"></div>
    <div><label>Sanidade Máx</label><input id="san_max" type="number"></div>
</div>

<div class="grid">
    <div><label>PE Atual</label><input id="pe_atual" type="number"></div>
    <div><label>PE Máx</label><input id="pe_max" type="number"></div>
    <div><label>PD Turno</label><input id="pd_turno" type="number"></div>
</div>

<div class="grid">
    <div><label>Defesa</label><input id="defesa" type="number"></div>
    <div><label>Bloqueio</label><input id="bloqueio" type="number"></div>
    <div><label>Esquiva</label><input id="esquiva" type="number"></div>
</div>

<h3>Armas</h3>
<input id="arma1" placeholder="Arma 1">
<input id="arma2" placeholder="Arma 2">
<input id="arma3" placeholder="Arma 3">

<h3>Atributos</h3>

<div class="grid">
    <div><label>FOR</label><input id="for" type="number"></div>
    <div><label>AGI</label><input id="agi" type="number"></div>
    <div><label>INT</label><input id="int" type="number"></div>
    <div><label>VIG</label><input id="vig" type="number"></div>
    <div><label>PRE</label><input id="pre" type="number"></div>
    <div><label>DESL</label><input id="desl" type="number"></div>
</div>

<h3>Extras</h3>
<textarea id="pericias"></textarea>
<textarea id="habilidades"></textarea>
<textarea id="rituais"></textarea>
<textarea id="equipamentos"></textarea>
<textarea id="descricao"></textarea>

<label>
<input id="modoPD" type="checkbox"> Modo PD
</label>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSyBp6FWCK0IYmeAbCMjdyStz5z1xeUvieV4",
  authDomain: "fichasrpg-45934.firebaseapp.com",
  databaseURL: "https://fichasrpg-45934-default-rtdb.firebaseio.com"
});

const db = getDatabase(app);
const id = new URLSearchParams(location.search).get("id");

const $ = (id) => document.getElementById(id);

let carregando = true;

/* LOAD */
async function load(){
    const snap = await get(child(ref(db),"personagens/"+id));
    if(!snap.exists()){carregando=false;return;}

    const p = snap.val();

    const i = p.dados?.info || {};
    const c = p.dados?.combate || {};
    const a = p.dados?.atributos || {};
    const e = p.extras || {};
    const cfg = p.config || {};

    $("nome").value = i.nome || "";
    $("classe").value = i.classe || "";
    $("origem").value = i.origem || "";

    $("hp_atual").value = c.hp_atual || 0;
    $("hp_max").value = c.hp_max || 0;

    $("san_atual").value = c.sanidade_atual || 0;
    $("san_max").value = c.sanidade_max || 0;

    $("pe_atual").value = c.pe_atual || 0;
    $("pe_max").value = c.pe_max || 0;
    $("pd_turno").value = c.pd_turno || 0;

    $("defesa").value = c.defesa || 0;
    $("bloqueio").value = c.bloqueio || 0;
    $("esquiva").value = c.esquiva || 0;

    $("arma1").value = c.arma1 || "";
    $("arma2").value = c.arma2 || "";
    $("arma3").value = c.arma3 || "";

    $("for").value = a.for || 0;
    $("agi").value = a.agi || 0;
    $("int").value = a.int || 0;
    $("vig").value = a.vig || 0;
    $("pre").value = a.pre || 0;
    $("desl").value = a.deslocamento || 0;

    $("pericias").value = e.pericias || "";
    $("habilidades").value = e.habilidades || "";
    $("rituais").value = e.rituais || "";
    $("equipamentos").value = e.equipamentos || "";
    $("descricao").value = e.descricao || "";

    $("modoPD").checked = cfg.modoPD || false;

    carregando = false;
}

/* SAVE (PADRÃO ÚNICO COM MOBILE) */
async function save(){
    if(carregando) return;

    await set(ref(db,"personagens/"+id),{
        dados:{
            info:{
                nome:$("nome").value,
                classe:$("classe").value,
                origem:$("origem").value
            },
            atributos:{
                for:+$("for").value||0,
                agi:+$("agi").value||0,
                int:+$("int").value||0,
                vig:+$("vig").value||0,
                pre:+$("pre").value||0,
                deslocamento:+$("desl").value||0
            },
            combate:{
                hp_atual:+$("hp_atual").value||0,
                hp_max:+$("hp_max").value||0,
                sanidade_atual:+$("san_atual").value||0,
                sanidade_max:+$("san_max").value||0,
                pe_atual:+$("pe_atual").value||0,
                pe_max:+$("pe_max").value||0,
                pd_turno:+$("pd_turno").value||0,
                defesa:+$("defesa").value||0,
                bloqueio:+$("bloqueio").value||0,
                esquiva:+$("esquiva").value||0,
                arma1:$("arma1").value,
                arma2:$("arma2").value,
                arma3:$("arma3").value
            }
        },
        extras:{
            pericias:$("pericias").value,
            habilidades:$("habilidades").value,
            rituais:$("rituais").value,
            equipamentos:$("equipamentos").value,
            descricao:$("descricao").value
        },
        config:{
            modoPD:$("modoPD").checked
        }
    });
}

setInterval(save,5000);
window.onload=load;
</script>

</body>
</html>
