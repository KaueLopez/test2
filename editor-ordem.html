<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Editor Ordem Paranormal</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #0a0a0a;
    color: #eaeaea;
}

/* CONTAINER PRINCIPAL */
.box {
    max-width: 1100px;
    margin: auto;
    background: #121212;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 20px;
}

/* INPUTS */
input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 12px;
    border-radius: 8px;
    border: none;
    background: #ffffff;
    color: #000;
    font-size: 14px;
    box-sizing: border-box;
}

textarea {
    min-height: 80px;
    resize: vertical;
}

/* TÍTULOS */
h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #ffffff;
}

h3 {
    margin-top: 20px;
    margin-bottom: 10px;
    padding: 8px 10px;
    background: #1f1f1f;
    border-left: 4px solid #7c3aed;
    border-radius: 6px;
    font-size: 14px;
}

/* GRID BASE (3 COLUNAS LIMPA) */
.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

/* BLOCO DE CAMPO */
.field {
    display: flex;
    flex-direction: column;
}

/* LABEL */
.label {
    font-size: 11px;
    color: #bbb;
    margin-top: 4px;
    text-align: center;
}

/* CAMPOS NUMÉRICOS */
input[type="number"] {
    text-align: center;
    font-weight: bold;
}

/* DESTACAR CAMPOS IMPORTANTES */
input:focus, textarea:focus {
    outline: 2px solid #7c3aed;
}

/* SEÇÕES VISUAIS */
.section {
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid #2a2a2a;
}

/* RESPONSIVO */
@media (max-width: 768px) {
    .grid {
        grid-template-columns: repeat(2, 1fr);
    }
}
</style>
</head>

<body>

<h2>Ordem Paranormal</h2>

<div class="box">

<input id="nome" placeholder="Nome">
<input id="origem" placeholder="Origem">
<input id="classe" placeholder="Classe">

<h3>Atributos</h3>
<div class="grid">
<input id="agi" type="number">
<input id="for" type="number">
<input id="int" type="number">
<input id="vig" type="number">
<input id="pre" type="number">
<input id="nivel" type="number">
</div>

<input id="nex" type="number" placeholder="NEX">

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({
  apiKey: "xxx",
  authDomain: "xxx",
  databaseURL: "xxx"
});

const db = getDatabase(app);

let id = new URLSearchParams(location.search).get("id");
let carregando = true;

/* LOAD */
get(child(ref(db), "personagens/" + id)).then(snap => {
    const p = snap.val();

    const i = p.dados?.info || {};
    const a = p.dados?.atributos || {};

    nome.value = i.nome || "";
    origem.value = i.origem || "";
    classe.value = i.classe || "";

    agi.value = a.agi || 0;
    for.value = a.for || 0;
    int.value = a.int || 0;
    vig.value = a.vig || 0;
    pre.value = a.pre || 0;
    nivel.value = a.nivel || 0;
    nex.value = a.nex || 0;

    carregando = false;
});

/* SAVE */
setInterval(() => {
    if (carregando) return;

    set(ref(db, "personagens/" + id), {
        tipo: "ordem",
        dados: {
            info: {
                nome: nome.value,
                origem: origem.value,
                classe: classe.value
            },
            atributos: {
                agi: +agi.value || 0,
                for: +for.value || 0,
                int: +int.value || 0,
                vig: +vig.value || 0,
                pre: +pre.value || 0,
                nivel: +nivel.value || 0,
                nex: +nex.value || 0
            }
        }
    });
}, 600);
</script>

</body>
</html>
