<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Editor Ordem Paranormal</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #0a0a0a;
    color: #eaeaea;
}

.box {
    max-width: 1100px;
    margin: auto;
    background: #121212;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 20px;
}

/* CAMPOS */
.field {
    display: flex;
    flex-direction: column;
    margin-bottom: 12px;
}

label {
    font-size: 12px;
    color: #bbb;
    margin-bottom: 4px;
}

/* INPUTS */
input, textarea {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #fff;
    color: #000;
    font-size: 14px;
    box-sizing: border-box;
}

textarea {
    min-height: 80px;
}

/* TÍTULOS */
h2 {
    text-align: center;
}

h3 {
    margin-top: 20px;
    padding: 8px;
    background: #1f1f1f;
    border-left: 4px solid #7c3aed;
    border-radius: 6px;
    font-size: 14px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

/* RESPONSIVO */
@media (max-width: 768px) {
    .grid {
        grid-template-columns: repeat(2, 1fr);
    }
}
</style>
</head>

<body>

<h2>Ordem Paranormal</h2>

<div class="box">

<!-- INFO -->
<h3>Informações</h3>

<div class="field">
<label>Nome</label>
<input id="nome">
</div>

<div class="field">
<label>Origem</label>
<input id="origem">
</div>

<div class="field">
<label>Classe</label>
<input id="classe">
</div>

<!-- SAÚDE -->
<h3>Saúde</h3>

<div class="grid">

<div class="field">
<label>HP Atual</label>
<input id="hp_atual" type="number">
</div>

<div class="field">
<label>HP Máximo</label>
<input id="hp_max" type="number">
</div>

<div class="field">
<label>Defesa</label>
<input id="defesa" type="number">
</div>

</div>

<!-- ATRIBUTOS -->
<h3>Atributos</h3>

<div class="grid">

<div class="field"><label>AGI</label><input id="agi" type="number"></div>
<div class="field"><label>FOR</label><input id="for" type="number"></div>
<div class="field"><label>INT</label><input id="int" type="number"></div>
<div class="field"><label>VIG</label><input id="vig" type="number"></div>
<div class="field"><label>PRE</label><input id="pre" type="number"></div>
<div class="field"><label>NÍVEL</label><input id="nivel" type="number"></div>

</div>

<div class="field">
<label>NEX</label>
<input id="nex" type="number">
</div>

<!-- COMBATE -->
<h3>Combate</h3>

<div class="grid">

<div class="field"><label>Deslocamento</label><input id="deslocamento" type="number"></div>
<div class="field"><label>Bloqueio</label><input id="bloqueio" type="number"></div>
<div class="field"><label>Esquiva</label><input id="esquiva" type="number"></div>

</div>

<!-- OUTROS -->
<h3>Outros</h3>

<div class="field">
<label>Descrição</label>
<textarea id="descricao"></textarea>
</div>

<div class="field">
<label>Equipamentos</label>
<textarea id="equipamentos"></textarea>
</div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({
  apiKey: "xxx",
  authDomain: "xxx",
  databaseURL: "xxx"
});

const db = getDatabase(app);

let id = new URLSearchParams(location.search).get("id");
let carregando = true;

/* LOAD */
get(child(ref(db), "personagens/" + id)).then(snap => {
    const p = snap.val();

    const i = p.dados?.info || {};
    const a = p.dados?.atributos || {};
    const c = p.dados?.combate || {};

    nome.value = i.nome || "";
    origem.value = i.origem || "";
    classe.value = i.classe || "";

    hp_atual.value = c.hp_atual || 0;
    hp_max.value = c.hp_max || 0;
    defesa.value = c.defesa || 0;

    agi.value = a.agi || 0;
    for.value = a.for || 0;
    int.value = a.int || 0;
    vig.value = a.vig || 0;
    pre.value = a.pre || 0;
    nivel.value = a.nivel || 0;
    nex.value = a.nex || 0;

    deslocamento.value = c.deslocamento || 0;
    bloqueio.value = c.bloqueio || 0;
    esquiva.value = c.esquiva || 0;

    descricao.value = p.descricao || "";
    equipamentos.value = p.equipamentos || "";

    carregando = false;
});

/* SAVE */
setInterval(() => {
    if (carregando) return;

    set(ref(db, "personagens/" + id), {
        tipo: "ordem",
        dados: {
            info: {
                nome: nome.value,
                origem: origem.value,
                classe: classe.value
            },
            atributos: {
                agi: +agi.value || 0,
                for: +for.value || 0,
                int: +int.value || 0,
                vig: +vig.value || 0,
                pre: +pre.value || 0,
                nivel: +nivel.value || 0,
                nex: +nex.value || 0
            },
            combate: {
                hp_atual: +hp_atual.value || 0,
                hp_max: +hp_max.value || 0,
                defesa: +defesa.value || 0,
                deslocamento: +deslocamento.value || 0,
                bloqueio: +bloqueio.value || 0,
                esquiva: +esquiva.value || 0
            }
        },
        descricao: descricao.value,
        equipamentos: equipamentos.value
    });
}, 500);
</script>

</body>
